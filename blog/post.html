<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../images/logo-small.svg" />
  <title>Loading… — Clockworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f9f7f2; --ink: #1a1917; --ink-muted: #6b6860; --ink-faint: #b0ada6;
      --border: rgba(26,25,23,0.1);
      --accent: #C4834A; --accent-dark: #A86C35;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); font-size: 17px; line-height: 1.8; -webkit-font-smoothing: antialiased; }

    /* Header */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(249,247,242,0.92); backdrop-filter: blur(10px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-logo { font-family: var(--serif); font-size: 1.15rem; letter-spacing: 0.02em; color: var(--ink); text-decoration: none; }
    .header-back { font-size: 13px; color: var(--ink-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .header-back:hover { color: var(--ink); }
    .header-back svg { flex-shrink: 0; }

    /* Reading progress bar */
    #progress-bar { position: fixed; top: 56px; left: 0; width: 0%; height: 2px; background: var(--accent); z-index: 200; transition: width 0.1s linear; }

    /* Loading / error states */
    .state-center { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); flex-direction: column; gap: 16px; }
    .state-center p { font-size: 15px; color: var(--ink-muted); }
    .spinner { width: 32px; height: 32px; border: 2.5px solid rgba(196,131,74,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Draft / scheduled banner */
    .status-banner {
      text-align: center; padding: 10px 20px; font-size: 13px; font-weight: 600;
    }
    .status-banner.scheduled { background: rgba(251,191,36,0.1); color: #92400e; border-bottom: 1px solid rgba(251,191,36,0.25); }
    .status-banner.draft     { background: rgba(148,163,184,0.1); color: var(--ink-muted); border-bottom: 1px solid var(--border); }

    /* Post header */
    .post-header {
      max-width: 720px; margin: 0 auto; padding: 56px 24px 40px;
      text-align: center;
    }
    .post-kicker { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .post-title { font-family: var(--serif); font-size: clamp(28px, 5vw, 46px); line-height: 1.15; color: var(--ink); margin-bottom: 18px; }
    .post-meta { font-size: 14px; color: var(--ink-muted); display: flex; align-items: center; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .post-divider { width: 48px; height: 2px; background: var(--accent); margin: 32px auto 0; border-radius: 1px; }

    /* Post body */
    .post-body {
      max-width: 680px; margin: 0 auto; padding: 48px 24px 80px;
    }
    /* Ensure uploaded HTML content looks right */
    .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
      font-family: var(--serif); margin-top: 2em; margin-bottom: 0.6em; color: var(--ink); line-height: 1.2;
    }
    .post-body h1 { font-size: 2em; }
    .post-body h2 { font-size: 1.5em; }
    .post-body h3 { font-size: 1.2em; }
    .post-body p  { margin-bottom: 1.2em; }
    .post-body ul, .post-body ol { margin: 1em 0 1.2em 1.5em; }
    .post-body li { margin-bottom: 0.4em; }
    .post-body a  { color: var(--accent-dark); text-decoration: underline; }
    .post-body a:hover { color: var(--accent); }
    .post-body blockquote {
      border-left: 3px solid var(--accent); margin: 1.5em 0;
      padding: 0.5em 1.2em; background: rgba(196,131,74,0.04);
      font-style: italic; color: var(--ink-muted);
    }
    .post-body img { max-width: 100%; border-radius: 10px; margin: 1em 0; }
    .post-body pre, .post-body code {
      background: #1a1917; color: #e2e8f0;
      border-radius: 6px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px;
    }
    .post-body pre { padding: 16px; overflow-x: auto; margin: 1.5em 0; }
    .post-body code { padding: 2px 6px; font-size: 0.88em; }
    .post-body pre code { padding: 0; background: none; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .post-body table { border-collapse: collapse; width: 100%; margin: 1.5em 0; font-size: 14px; }
    .post-body th, .post-body td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
    .post-body th { background: rgba(26,25,23,0.04); font-weight: 600; }

    /* Back to blog footer */
    .post-footer {
      max-width: 680px; margin: 0 auto; padding: 0 24px 64px;
      border-top: 1px solid var(--border); padding-top: 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .post-footer a { font-size: 14px; color: var(--ink-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .post-footer a:hover { color: var(--ink); }
  </style>
</head>
<body>

<div id="progress-bar"></div>

<header class="site-header">
  <a href="../index.html" class="site-logo">Clockworks</a>
  <a href="javascript:history.back()" class="header-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</header>

<div id="page-content">
  <div class="state-center" id="loading-state">
    <div class="spinner"></div>
    <p>Loading post…</p>
  </div>
  <div class="state-center" id="error-state" style="display:none;">
    <p id="error-msg">Post not found.</p>
    <a href="../index.html" style="font-size:13px;color:#C4834A;text-decoration:underline;">← Back to home</a>
  </div>
  <div id="post-content" style="display:none;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyAgYsFRypLXu5yym-KIRS9GXqcRWGwrtkA",
  authDomain:        "stonearchai.firebaseapp.com",
  projectId:         "stonearchai",
  storageBucket:     "stonearchai.firebasestorage.app",
  messagingSenderId: "815481121273",
  appId:             "1:815481121273:web:182d13a485f645c9bdf528"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadPost() {
  const postId = getParam('id');
  const slug   = getParam('slug');

  if (!postId && !slug) {
    showError('No post specified.');
    return;
  }

  try {
    let snap;
    if (postId) {
      snap = await db.collection('blogPosts').doc(postId).get();
      if (!snap.exists) { showError('Post not found.'); return; }
      renderPost(snap.id, snap.data());
    } else {
      const q = await db.collection('blogPosts').where('slug', '==', slug).limit(1).get();
      if (q.empty) { showError('Post not found.'); return; }
      renderPost(q.docs[0].id, q.docs[0].data());
    }
  } catch(e) {
    showError('Failed to load post: ' + e.message);
  }
}

function renderPost(id, post) {
  const loadEl   = document.getElementById('loading-state');
  const contentEl = document.getElementById('post-content');

  loadEl.style.display = 'none';
  contentEl.style.display = 'block';

  const now = new Date();
  const scheduledAt = post.scheduledAt ? (post.scheduledAt.toDate ? post.scheduledAt.toDate() : new Date(post.scheduledAt)) : null;
  const isDraft     = post.status === 'draft';
  const isScheduled = post.status === 'scheduled' && scheduledAt && scheduledAt > now;

  // Update page title
  document.title = (post.title || 'Post') + ' — Clockworks';

  // Update meta description if we can
  const metaDesc = document.querySelector('meta[name="description"]');
  if (!metaDesc) {
    const m = document.createElement('meta');
    m.name = 'description';
    m.content = post.title || 'Clockworks blog post';
    document.head.appendChild(m);
  }

  let bannerHtml = '';
  if (isDraft) {
    bannerHtml = '<div class="status-banner draft">📝 Preview — This post is saved as a draft and not publicly visible.</div>';
  } else if (isScheduled) {
    bannerHtml = `<div class="status-banner scheduled">📅 Scheduled — This post goes live on ${fmtDate(post.scheduledAt)}.</div>`;
  }

  const publishDate = post.status === 'published' && post.publishedAt
    ? fmtDate(post.publishedAt)
    : post.scheduledAt ? fmtDate(post.scheduledAt)
    : fmtDate(post.createdAt);

  contentEl.innerHTML = `
    ${bannerHtml}
    <header class="post-header">
      <p class="post-kicker">Clockworks Blog</p>
      <h1 class="post-title">${escHtml(post.title || 'Untitled')}</h1>
      <div class="post-meta">
        ${publishDate ? '<span>' + publishDate + '</span>' : ''}
        ${post.slug ? '<span style="color:#b0ada6;">' + post.slug + '</span>' : ''}
      </div>
      <div class="post-divider"></div>
    </header>
    <article class="post-body" id="post-body">
      ${post.htmlContent || '<p style="color:#b0ada6;">No content available.</p>'}
    </article>
    <footer class="post-footer">
      <a href="../index.html">← Back to Clockworks</a>
      <a href="javascript:window.scrollTo({top:0,behavior:'smooth'})">↑ Top</a>
    </footer>
  `;

  // Reading progress bar
  window.addEventListener('scroll', () => {
    const body   = document.body;
    const html   = document.documentElement;
    const height = Math.max(body.scrollHeight, html.scrollHeight) - window.innerHeight;
    const pct    = height > 0 ? Math.min(100, (window.scrollY / height) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
  }, { passive: true });
}

function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display  = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPost();
</script>
</body>
</html>
