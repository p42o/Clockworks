name: Monthly blog publish

# Rebuilds the static site on the 1st of each month so future-dated posts in
# site/content/blog go live (build-time gating in site/src/lib/blog.ts).
# Deploys FTPS directly because pushes made with GITHUB_TOKEN don't retrigger
# the deploy workflow.

on:
  schedule:
    - cron: "9 15 1 * *" # 1st of the month, 9:09 AM Central-ish (15:09 UTC)
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: npm ci

      - name: Build + sync (root if flipped, else /v3 preview)
        working-directory: site
        run: |
          if grep -q 'data-cw="v3"' ../index.html 2>/dev/null; then
            echo "Root is flipped — publishing to root"
            npm run export:root
          else
            echo "Root not flipped yet — refreshing /v3 preview only"
            npm run export:preview
          fi

      - name: Commit refreshed output
        run: |
          git config user.name "clockworks-publisher"
          git config user.email "actions@users.noreply.github.com"
          git add -A ':!site/node_modules' ':!site/.next' ':!site/out'
          git diff --cached --quiet && echo "Nothing new to publish" || git commit -m "chore: monthly blog publish $(date +%Y-%m)"
          git push

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            Archive.zip
            site/**
            **/node_modules/**
