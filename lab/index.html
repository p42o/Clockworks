<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>THE LAB — night shift</title>
<style>
/* ==========================================================================
   THE LAB — autonomous product studio, facility cutaway
   Base-builder game framing: elevator + floors + drill-down rooms.
   Data: tries ./data/status.json (LIVE) → falls back to shift sim (SIM).
   ========================================================================== */
:root{
  --void:#060910; --chassis:#0d1422; --chassis-2:#111a2c; --seam:#1d2942; --seam-hi:#2c3d63;
  --ink:#cdd9f4; --ink-dim:#7d8db4; --ink-faint:#49587e;
  --cyan:#3ce0c8; --cyan-dk:#0f9d8e;
  --amber:#ffa23d; --amber-dk:#c9741d;      /* FOUNDRY */
  --violet:#b98bff; --violet-dk:#7d51c9;    /* SIGNAL */
  --blue:#5ea8ff;  --blue-dk:#2f6fc9;       /* OPS */
  --ember:#ff6a5e; --ember-dk:#c93a30;      /* CORE */
  --good:#56e07c; --warn:#ffd24d; --crit:#ff5470; --you:#ff4d92;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1100px 600px at 85% -8%, rgba(255,162,61,.05), transparent 55%),
    radial-gradient(900px 700px at 8% 108%, rgba(60,224,200,.06), transparent 55%),
    var(--void);
  color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
canvas#dust{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.45;mix-blend-mode:multiply;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0,rgba(0,0,0,.15) 1px,transparent 1px,transparent 3px)}
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 220px 30px rgba(0,0,0,.8)}
#app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

/* ---------------- keycard gate ---------------- */
#gate{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:var(--void)}
#gate .term{width:min(360px,92vw);border:1px solid var(--seam-hi);border-radius:12px;padding:26px 24px 24px;
  background:linear-gradient(180deg,var(--chassis-2),var(--chassis));box-shadow:0 0 60px -20px rgba(60,224,200,.35),inset 0 0 30px rgba(0,0,0,.5)}
#gate h1{margin:0 0 2px;font:700 15px/1.2 var(--mono);letter-spacing:.3em;color:var(--cyan)}
#gate .sub{font:11px var(--mono);letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:20px}
#gate .slots{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
#gate .slot{width:44px;height:54px;border:1px solid var(--seam-hi);border-radius:8px;background:var(--void);
  display:grid;place-items:center;font:700 22px var(--mono);color:var(--cyan)}
#gate .slot.on{border-color:var(--cyan-dk);box-shadow:0 0 14px -4px var(--cyan)}
#gate .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
#gate .pad button{padding:13px 0;border-radius:8px;border:1px solid var(--seam-hi);cursor:pointer;
  background:linear-gradient(180deg,var(--chassis-2),var(--void));color:var(--ink);font:600 16px var(--mono)}
#gate .pad button:active{transform:translateY(1px);border-color:var(--cyan-dk)}
#gate .msg{margin-top:14px;text-align:center;font:10px var(--mono);letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;min-height:14px}
#gate.deny .term{animation:shake .4s}
@keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

/* ---------------- HUD bar ---------------- */
.hud{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:10px clamp(12px,2.5vw,26px);border-bottom:1px solid var(--seam);
  background:linear-gradient(180deg,rgba(13,20,34,.97),rgba(13,20,34,.85));backdrop-filter:blur(8px)}
.hud .mark{display:flex;align-items:center;gap:11px;min-width:0}
.hud .sigil{width:36px;height:36px;border:1px solid var(--seam-hi);border-radius:8px;display:grid;place-items:center;font-size:18px;
  background:radial-gradient(circle at 35% 25%,rgba(60,224,200,.2),transparent 60%),var(--chassis-2);box-shadow:0 0 12px -3px var(--cyan)}
.hud .t1{font:700 14px var(--mono);letter-spacing:.3em;white-space:nowrap}
.hud .t1 b{color:var(--cyan)}
.hud .t2{font:9.5px var(--mono);letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;margin-top:2px}
.hud .spacer{flex:1}
.hud .chip{font:10px var(--mono);letter-spacing:.14em;text-transform:uppercase;padding:6px 11px;border-radius:999px;
  border:1px solid var(--seam-hi);color:var(--ink-dim);display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.hud .chip .led{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2.2s infinite}
.hud .chip.sim{color:var(--warn);border-color:rgba(255,210,77,.4)}
.hud .chip.sim .led{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.hud .chip.live{color:var(--good);border-color:rgba(86,224,124,.4)}
.hud .clock{font:600 13px var(--mono);color:var(--ink-dim);font-variant-numeric:tabular-nums}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------------- views ---------------- */
main{flex:1;display:grid}
.view{grid-area:1/1;opacity:0;pointer-events:none;transform:scale(.985);transition:opacity .28s ease,transform .28s ease}
.view.on{opacity:1;pointer-events:auto;transform:none}

/* ---------------- facility cutaway ---------------- */
.facility{max-width:1080px;width:100%;margin:0 auto;padding:clamp(14px,2.5vw,30px)}
.building{display:grid;grid-template-columns:76px 1fr;gap:0;border:1px solid var(--seam-hi);border-radius:14px;overflow:hidden;
  background:var(--chassis);box-shadow:0 30px 80px -40px #000, 0 0 0 6px rgba(13,20,34,.5)}
.roofline{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:9px 16px;
  background:repeating-linear-gradient(45deg,#151f34 0 12px,#0f1727 12px 24px);border-bottom:1px solid var(--seam-hi)}
.roofline .fac{font:700 11px var(--mono);letter-spacing:.34em;color:var(--ink-dim)}
.roofline .beacon{width:9px;height:9px;border-radius:50%;background:var(--crit);box-shadow:0 0 10px var(--crit);animation:pulse 1.6s infinite}

/* elevator */
.shaft{position:relative;border-right:1px solid var(--seam-hi);
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 2px,transparent 2px 14px),var(--void)}
.shaft .rail{position:absolute;top:0;bottom:0;width:1px;background:var(--seam-hi)}
.shaft .rail.l{left:14px}.shaft .rail.r{right:14px}
#car{position:absolute;left:10px;right:10px;height:52px;border:1px solid var(--cyan-dk);border-radius:7px;z-index:2;
  background:linear-gradient(180deg,#12202f,#0a1420);box-shadow:0 0 16px -5px var(--cyan),inset 0 0 10px rgba(0,0,0,.6);
  transition:top .7s cubic-bezier(.6,.05,.3,1);display:grid;place-items:center}
#car .doors{position:absolute;inset:4px;display:flex;border-radius:4px;overflow:hidden}
#car .door{flex:1;background:linear-gradient(90deg,#1a2a40,#101b2c);transition:transform .45s ease .1s;border-right:1px solid #0a141f}
#car .door.r{transform-origin:right}
#car.open .door.l{transform:translateX(-96%)}
#car.open .door.r{transform:translateX(96%)}
#car .glyph{font-size:19px;z-index:-1}
.floor-btns{position:absolute;left:0;right:0;bottom:8px;display:flex;flex-direction:column;gap:5px;align-items:center}

/* floors */
.floors{display:flex;flex-direction:column}
.floor{position:relative;display:grid;grid-template-columns:110px 1fr auto;gap:14px;align-items:center;
  min-height:106px;padding:14px 18px 16px;cursor:pointer;border-bottom:1px solid var(--seam);
  background:linear-gradient(180deg,rgba(17,26,44,.55),rgba(9,13,22,.75));transition:background .2s}
.floor:last-child{border-bottom:0}
.floor:hover{background:linear-gradient(180deg,rgba(23,35,58,.65),rgba(11,16,27,.8))}
.floor:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px}
.floor::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc,var(--cyan));opacity:.75;box-shadow:0 0 12px var(--fc,var(--cyan))}
.floor .plate{align-self:start;display:flex;flex-direction:column;gap:5px}
.floor .fno{font:700 10px var(--mono);letter-spacing:.2em;color:var(--ink-faint)}
.floor .fname{font:700 13px var(--mono);letter-spacing:.16em;color:var(--ink)}
.floor .frole{font:9.5px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.floor .scene{position:relative;height:74px;border:1px solid var(--seam);border-radius:9px;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.02),transparent 40%),var(--void)}
.floor .scene .deco{position:absolute;inset:0;opacity:.5}
.floor .scene .ground{position:absolute;left:0;right:0;bottom:0;height:10px;
  background:repeating-linear-gradient(90deg,#131e33 0 18px,#0d1626 18px 36px);border-top:1px solid var(--seam-hi)}
.sprite{position:absolute;bottom:9px;display:flex;flex-direction:column;align-items:center;gap:3px;will-change:transform;z-index:3}
.sprite .bub{font:9px var(--mono);color:var(--ink-dim);background:rgba(9,13,22,.92);border:1px solid var(--seam-hi);
  border-radius:6px;padding:3px 7px;white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis}
.sprite .bod{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:15px;
  border:1px solid var(--seam-hi);background:var(--chassis-2);box-shadow:0 3px 8px -2px #000;animation:bob 1.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-3px)}}
.walk{animation:patrol var(--walk-t,14s) ease-in-out infinite alternate}
@keyframes patrol{from{transform:translateX(6px)}to{transform:translateX(var(--walk-w,320px))}}
.floor .stats{display:flex;flex-direction:column;gap:6px;align-items:flex-end;min-width:132px}
.spill{font:9.5px var(--mono);letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:999px;border:1px solid var(--seam-hi);
  display:inline-flex;gap:6px;align-items:center;color:var(--ink-dim);white-space:nowrap}
.spill .d{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 7px currentColor}
.spill.act{color:var(--fc,var(--cyan))}
.spill.act .d{animation:pulse 1.8s infinite}
.spill.you{color:var(--you);border-color:rgba(255,77,146,.45)}
.spill.dark{color:var(--ink-faint)}
.floor .kv{font:10px var(--mono);color:var(--ink-faint)}
.floor .kv b{color:var(--ink-dim);font-weight:500;font-variant-numeric:tabular-nums}
/* commissioning floor: lights out */
.floor.dark .scene{filter:brightness(.55) saturate(.5)}
.floor.dark .scene::after{content:"COMMISSIONING";position:absolute;inset:auto 0 24px;text-align:center;
  font:700 10px var(--mono);letter-spacing:.4em;color:var(--ink-faint)}
.tarp{position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,210,77,.06) 0 14px,transparent 14px 28px)}

/* ticker */
.ticker{border-top:1px solid var(--seam);background:rgba(9,13,22,.95);overflow:hidden;white-space:nowrap;
  font:11px var(--mono);padding:8px 0;position:sticky;bottom:0;z-index:15}
.ticker .roll{display:inline-block;padding-left:100vw;animation:roll 60s linear infinite}
@keyframes roll{to{transform:translateX(-100%)}}
.ticker b{font-weight:700}
.ticker .sep{color:var(--ink-faint);margin:0 14px}

/* ---------------- room (drill-down) view ---------------- */
.room-wrap{max-width:1080px;width:100%;margin:0 auto;padding:clamp(14px,2.5vw,30px)}
.room-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.backbtn{cursor:pointer;border:1px solid var(--seam-hi);background:var(--chassis-2);color:var(--ink-dim);
  border-radius:8px;padding:9px 14px;font:11px var(--mono);letter-spacing:.14em;text-transform:uppercase}
.backbtn:hover{color:var(--cyan);border-color:var(--cyan-dk)}
.room-title h2{margin:0;font:700 clamp(18px,3vw,24px) var(--mono);letter-spacing:.2em}
.room-title .sub{font:10.5px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
.room-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
@media(max-width:920px){.room-grid{grid-template-columns:1fr}}
.pane{border:1px solid var(--seam);border-radius:12px;padding:16px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(17,26,44,.55),rgba(8,12,20,.8))}
.pane::before{content:"";position:absolute;top:7px;left:7px;width:13px;height:13px;border:1px solid var(--seam-hi);border-right:0;border-bottom:0}
.pane::after{content:"";position:absolute;bottom:7px;right:7px;width:13px;height:13px;border:1px solid var(--seam-hi);border-left:0;border-top:0}
.pane h3{margin:0 0 12px;font:700 11px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
.pane h3::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--rc,var(--cyan));box-shadow:0 0 8px var(--rc,var(--cyan))}
.prez{display:flex;gap:14px;align-items:center}
.prez .face{width:60px;height:60px;flex:none;border-radius:12px;display:grid;place-items:center;font-size:30px;
  border:1px solid var(--seam-hi);background:radial-gradient(circle at 38% 28%,rgba(255,255,255,.1),transparent 60%),var(--chassis-2);
  box-shadow:0 0 18px -6px var(--rc,var(--cyan))}
.prez .nm{font:700 16px var(--mono);letter-spacing:.14em}
.prez .rl{font:10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:3px 0 7px}
.mchip{display:inline-block;font:9.5px var(--mono);letter-spacing:.08em;padding:3px 8px;border-radius:5px;border:1px solid var(--seam-hi);color:var(--ink-dim);margin-right:5px}
.stations{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-top:14px}
.stn{border:1px solid var(--seam);border-radius:9px;padding:10px;background:rgba(255,255,255,.015)}
.stn .si{font-size:17px}
.stn .sn{font:700 10px var(--mono);letter-spacing:.14em;margin-top:5px}
.stn .ss{font:9px var(--mono);color:var(--ink-faint);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
.stn.hot{border-color:var(--rc,var(--cyan));box-shadow:0 0 14px -8px var(--rc,var(--cyan))}
.stn .sbar{height:4px;border-radius:3px;background:rgba(255,255,255,.06);margin-top:7px;overflow:hidden}
.stn .sbar i{display:block;height:100%;background:var(--rc,var(--cyan));transform-origin:left;transition:transform .6s}
.console{font:10.5px/1.7 var(--mono);height:210px;overflow:auto;display:flex;flex-direction:column-reverse;gap:1px}
.console .ln{display:flex;gap:8px}
.console .ts{color:var(--ink-faint);flex:none;font-variant-numeric:tabular-nums}
.console .tx{color:var(--ink-dim)}
.console .tx.hi{color:var(--rc,var(--cyan))}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi{border:1px solid var(--seam);border-radius:9px;padding:10px 12px;background:rgba(255,255,255,.015)}
.kpi .kk{font:9px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
.kpi .kv2{font:600 19px var(--mono);margin-top:4px;font-variant-numeric:tabular-nums}
.kpi .kv2 small{font-size:11px;color:var(--ink-dim)}
.qrow{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--seam);border-radius:8px;background:rgba(255,77,146,.04);margin-bottom:7px}
.qrow .qi{font-size:15px}
.qrow .qn{flex:1;font:10.5px var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qrow .qp{font:10.5px var(--mono);color:var(--amber)}
.charter{font:12.5px/1.65 var(--sans);color:var(--ink-dim)}
.charter b{color:var(--ink)}
.charter .step{display:flex;gap:9px;margin-bottom:7px}
.charter .step .n{flex:none;width:20px;height:20px;border-radius:5px;border:1px solid var(--seam-hi);display:grid;place-items:center;font:700 9px var(--mono);color:var(--rc,var(--cyan))}
.notewire{margin-top:12px;padding:9px 11px;border:1px dashed var(--seam-hi);border-radius:8px;font:9.5px var(--mono);letter-spacing:.06em;color:var(--ink-faint)}
.bigstat{display:flex;align-items:baseline;gap:8px;font:700 30px var(--mono);font-variant-numeric:tabular-nums}
.bigstat small{font:10px var(--mono);letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase}
.corebars{display:flex;flex-direction:column;gap:10px}
.cb .cl{display:flex;justify-content:space-between;font:9.5px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.cb .cl b{color:var(--ink-dim);font-variant-numeric:tabular-nums}
.cb .tr{height:7px;border-radius:4px;background:rgba(255,255,255,.05);overflow:hidden}
.cb .tr i{display:block;height:100%;background:linear-gradient(90deg,var(--ember-dk),var(--ember));transform-origin:left;transition:transform 1s}

@media(max-width:700px){
  .building{grid-template-columns:1fr}
  .shaft{display:none}
  .floor{grid-template-columns:1fr;gap:10px}
  .floor .stats{flex-direction:row;flex-wrap:wrap;justify-content:flex-start;min-width:0}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<canvas id="dust" aria-hidden="true"></canvas>
<div class="scan" aria-hidden="true"></div>
<div class="vig" aria-hidden="true"></div>

<!-- ===================== ACCESS GATE ===================== -->
<div id="gate">
  <div class="term">
    <h1>THE LAB</h1>
    <div class="sub">restricted facility · keycode required</div>
    <div class="slots"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
    <div class="pad">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button data-k="clr">CLR</button><button>0</button><button data-k="del">⌫</button>
    </div>
    <div class="msg" id="gateMsg">enter 4-digit keycode</div>
  </div>
</div>

<div id="app" hidden>
  <!-- ===================== HUD ===================== -->
  <header class="hud">
    <div class="mark">
      <div class="sigil">⬢</div>
      <div>
        <div class="t1">THE&nbsp;<b>LAB</b></div>
        <div class="t2">autonomous product studio · night shift</div>
      </div>
    </div>
    <div class="spacer"></div>
    <span class="chip" id="feedChip"><span class="led"></span><span id="feedLbl">SIM FEED</span></span>
    <span class="chip"><span class="led" style="background:var(--amber);box-shadow:0 0 8px var(--amber)"></span>SPEND <span id="hudSpend" style="color:var(--ink)">$0.00</span></span>
    <span class="chip you">AWAITING YOU <b id="hudQueue" style="color:var(--you)">0</b></span>
    <span class="clock" id="clock">00:00:00</span>
  </header>

  <main>
    <!-- ===================== FACILITY VIEW ===================== -->
    <section class="view on" id="view-facility">
      <div class="facility">
        <div class="building">
          <div class="roofline"><span class="fac">FACILITY 01 · MAPLE GROVE GRID</span><span class="beacon"></span></div>
          <div class="shaft" id="shaft">
            <div class="rail l"></div><div class="rail r"></div>
            <div id="car"><div class="doors"><div class="door l"></div><div class="door r"></div></div><div class="glyph">🛗</div></div>
          </div>
          <div class="floors" id="floors"><!-- floors injected --></div>
        </div>
      </div>
    </section>

    <!-- ===================== ROOM VIEW ===================== -->
    <section class="view" id="view-room">
      <div class="room-wrap">
        <div class="room-top">
          <button class="backbtn" id="backBtn">◂ Facility</button>
          <div class="room-title"><h2 id="rTitle"></h2><div class="sub" id="rSub"></div></div>
        </div>
        <div id="rBody"></div>
      </div>
    </section>
  </main>

  <!-- ===================== TICKER ===================== -->
  <div class="ticker"><div class="roll" id="tickRoll"></div></div>
</div>

<script>
(function(){
"use strict";
var reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
var $=function(s,r){return (r||document).querySelector(s)};

/* ============ ACCESS GATE (soft gate, not security) ============ */
var PIN="8520", buf="", gate=$("#gate"), slots=gate.querySelectorAll(".slot");
function paint(){slots.forEach(function(s,i){s.textContent=buf[i]?"•":"";s.classList.toggle("on",!!buf[i])})}
function unlock(){gate.style.transition="opacity .5s";gate.style.opacity="0";
  setTimeout(function(){gate.remove()},520);$("#app").hidden=false;boot()}
gate.addEventListener("click",function(e){
  var b=e.target.closest("button");if(!b)return;
  var k=b.getAttribute("data-k")||b.textContent;
  if(k==="clr")buf="";else if(k==="del")buf=buf.slice(0,-1);
  else if(buf.length<4)buf+=k;
  paint();
  if(buf.length===4){
    if(buf===PIN){sessionStorage.setItem("lab-key","1");$("#gateMsg").textContent="ACCESS GRANTED";unlock()}
    else{gate.classList.add("deny");$("#gateMsg").textContent="ACCESS DENIED";
      setTimeout(function(){gate.classList.remove("deny");buf="";paint()},450)}
  }
});
document.addEventListener("keydown",function(e){
  if(!document.body.contains(gate))return;
  if(/^[0-9]$/.test(e.key)&&buf.length<4){buf+=e.key;paint()}
  if(e.key==="Backspace"){buf=buf.slice(0,-1);paint()}
  if(buf.length===4){var ev=new Event("click");var fake=gate.querySelector(".pad button");/*route through same check*/
    if(buf===PIN){sessionStorage.setItem("lab-key","1");unlock()}else{gate.classList.add("deny");setTimeout(function(){gate.classList.remove("deny");buf="";paint()},450)}}
});
if(sessionStorage.getItem("lab-key")==="1"){gate.remove();$("#app").hidden=false;boot()}

/* ============ LIVE FEED ADAPTER ============ */
function tryLive(){
  fetch("data/status.json",{cache:"no-store"}).then(function(r){if(!r.ok)throw 0;return r.json()})
  .then(function(j){
    C.feed="live";
    $("#feedLbl").textContent="LIVE FEED";
    $("#feedChip").classList.remove("sim");$("#feedChip").classList.add("live");
    // merge known fields conservatively
    if(j.foundry){
      var f=C.rooms.foundry;
      if(j.foundry.current_task) f.bubble=[j.foundry.current_task];
      if(j.foundry.staged_for_review){
        f.queue=j.foundry.staged_for_review.map(function(p){return["🗂️",p.name,"$"+p.price]});
        C.queue=j.foundry.staged_for_review.length;
      }
      if(typeof j.foundry.spend_estimate_usd==="number") C.spend=j.foundry.spend_estimate_usd;
      if(j.foundry.learnings) f.log.unshift(["LEARN: "+j.foundry.learnings,"hi"]);
    }
    paintHud(); if(location.hash.indexOf("foundry")>-1) openRoom("foundry",true);
  }).catch(function(){ $("#feedChip").classList.add("sim"); });
}

/* ============ BOOT ============ */
var booted=false;
function boot(){
  if(booted)return; booted=true;
  buildFloors(); buildTicker(); paintHud(); tryLive();
  startClock(); startDust(); route();
  addEventListener("hashchange",route);
}

function paintHud(){
  $("#hudSpend").textContent="$"+C.spend.toFixed(2);
  $("#hudQueue").textContent=C.queue;
}

/* ============ FACILITY BUILD ============ */
function buildFloors(){
  var fl=$("#floors"), html="";
  C.order.forEach(function(k){
    var r=C.rooms[k];
    html+='<div class="floor'+(r.dark?" dark":"")+'" tabindex="0" data-room="'+k+'" style="--fc:'+r.color+'" aria-label="'+r.name+'">'
      +'<div class="plate"><div class="fno">'+r.fno+' ▸</div><div class="fname">'+r.name+'</div><div class="frole">'+r.role+'</div></div>'
      +'<div class="scene">'+(r.dark?'<div class="tarp"></div>':"")
      +'<div class="deco" data-deco="'+k+'"></div><div class="ground"></div>'
      +(r.dark?"":'<div class="sprite walk" style="--walk-w:min(58vw,300px);--walk-t:'+(11+Math.random()*7).toFixed(1)+'s">'
        +'<div class="bub" data-bub="'+k+'">…</div><div class="bod">'+r.glyph+'</div></div>')
      +'</div>'
      +'<div class="stats"><span class="spill '+r.status.cls+'"><span class="d"></span>'+r.status.label+'</span>'
      +'<span class="kv"><b>'+r.kv+'</b></span></div></div>';
  });
  fl.innerHTML=html;
  fl.querySelectorAll(".floor").forEach(function(f){
    f.addEventListener("click",function(){location.hash="#/room/"+f.getAttribute("data-room")});
    f.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();f.click()}});
  });
  // speech bubbles cycle
  if(!reduce)setInterval(function(){
    C.order.forEach(function(k){
      var r=C.rooms[k]; if(!r.bubble||!r.bubble.length)return;
      var el=fl.querySelector('[data-bub="'+k+'"]'); if(!el)return;
      el.textContent=r.bubble[Math.floor(Math.random()*r.bubble.length)];
    });
  },3600);
  C.order.forEach(function(k){var r=C.rooms[k],el=fl.querySelector('[data-bub="'+k+'"]');if(el&&r.bubble.length)el.textContent=r.bubble[0]});
  positionCar(0,false);
}

/* elevator car follows selection */
function positionCar(idx,open){
  var floors=$("#floors").children, car=$("#car");
  if(!floors.length)return;
  var first=floors[0], target=floors[idx];
  var top=target.offsetTop+(target.offsetHeight-52)/2;
  car.style.top=top+"px";
  car.classList.remove("open");
  if(open)setTimeout(function(){car.classList.add("open")},720);
}

/* ============ TICKER ============ */
function buildTicker(){
  var s="";
  C.ticker.forEach(function(t){s+='<b style="color:'+t[1]+'">'+t[0]+'</b>&nbsp; '+t[2]+'<span class="sep">◆</span>'});
  $("#tickRoll").innerHTML=s+s;
}

/* ============ ROOM VIEW ============ */
var current=null;
function route(){
  var m=location.hash.match(/#\/room\/(\w+)/);
  if(m&&C.rooms[m[1]])openRoom(m[1]);
  else showFacility();
}
function showFacility(){
  $("#view-room").classList.remove("on");
  $("#view-facility").classList.add("on");
  current=null;
}
function openRoom(k,repaint){
  if(current===k&&!repaint)return;
  current=k;
  var r=C.rooms[k], idx=C.order.indexOf(k);
  positionCar(idx,true);
  $("#rTitle").textContent=r.fno+" · "+r.name;
  $("#rTitle").style.color=""; $("#rSub").textContent=r.sub;
  var col=r.color;
  var stHtml=r.stations.map(function(s){
    var pct=typeof s[3]==="number"?s[3]:null;
    return '<div class="stn'+(pct!==null&&pct>0.2&&pct<1?" hot":"")+'"><div class="si">'+s[0]+'</div><div class="sn">'+s[1]+'</div><div class="ss">'+s[2]+'</div>'
      +(pct!==null?'<div class="sbar"><i style="transform:scaleX('+pct+')"></i></div>':"")+'</div>';
  }).join("");
  var kpiHtml=r.kpis.map(function(kp){return '<div class="kpi"><div class="kk">'+kp[0]+'</div><div class="kv2">'+kp[1]+'</div></div>'}).join("");
  var qHtml="";
  if(r.queue){qHtml='<div class="pane" style="--rc:'+col+'"><h3>Review queue — awaiting Parker</h3>'
    +r.queue.map(function(q){return '<div class="qrow"><span class="qi">'+q[0]+'</span><span class="qn">'+q[1]+'</span><span class="qp">'+q[2]+'</span></div>'}).join("")
    +'<div class="notewire">approve/publish runs from your Mac (gumroad cli + cover upload) — wiring: phase 2</div></div>'}
  var logHtml=r.log.map(function(l,i){
    var t=new Date(Date.now()-i*47000);
    var p=function(n){return(n<10?"0":"")+n};
    return '<div class="ln"><span class="ts">'+p(t.getHours())+":"+p(t.getMinutes())+":"+p(t.getSeconds())+'</span><span class="tx '+(l[1]||"")+'">'+l[0]+'</span></div>';
  }).join("");
  $("#rBody").innerHTML=
    '<div class="room-grid" style="--rc:'+col+'">'
    +'<div style="display:flex;flex-direction:column;gap:16px">'
      +'<div class="pane" style="--rc:'+col+'"><h3>President</h3>'
        +'<div class="prez"><div class="face" style="--rc:'+col+'">'+r.glyph+'</div><div>'
        +'<div class="nm">'+(k==="ceo"?"THEO":k==="foundry"?"VULCAN":k==="signal"?"ECHO":k==="ops"?"ATLAS":"CORE SYSTEMS")+'</div>'
        +'<div class="rl">'+r.role+'</div><span class="mchip">'+r.model+'</span></div></div>'
        +'<div class="charter" style="margin-top:13px">'+r.about+'</div>'
        +'<div class="stations">'+stHtml+'</div></div>'
      +qHtml
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:16px">'
      +'<div class="pane" style="--rc:'+col+'"><h3>Telemetry</h3><div class="kpis">'+kpiHtml+'</div></div>'
      +'<div class="pane" style="--rc:'+col+'"><h3>Console</h3><div class="console">'+logHtml+'</div></div>'
    +'</div></div>';
  $("#view-facility").classList.remove("on");
  $("#view-room").classList.add("on");
}
$("#backBtn").addEventListener("click",function(){location.hash="#/"});

/* ============ CLOCK + DUST ============ */
function startClock(){
  var c=$("#clock");
  function tick(){var d=new Date(),p=function(n){return(n<10?"0":"")+n};
    c.textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());}
  tick(); setInterval(tick,1000);
}
function startDust(){
  var cv=$("#dust"),cx=cv.getContext("2d"),ps=[];
  function size(){cv.width=innerWidth;cv.height=innerHeight}
  size(); addEventListener("resize",size);
  for(var i=0;i<40;i++)ps.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.4,
    vx:(Math.random()-.5)*.00016,vy:(Math.random()-.5)*.00016,a:Math.random()*.45+.12,
    c:Math.random()>.8?"255,162,61":"60,224,200"});
  function draw(){cx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      cx.beginPath();cx.arc(p.x*cv.width,p.y*cv.height,p.r,0,6.283);
      cx.fillStyle="rgba("+p.c+","+p.a+")";cx.fill()}
    if(!reduce)requestAnimationFrame(draw)}
  draw();
}
})();
