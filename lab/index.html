<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>THE LAB — facility</title>
<style>
/* ==========================================================================
   THE LAB v3 — honest edition.
   2 real agents (Theo, Vulcan) + 2 empty division slots + ADMIN truth panel.
   Everything on screen is either LIVE DATA, clearly-labeled decoration,
   or an empty template. No fake agents, no invented chatter.
   Feed: ./data/status.json → pool.gs-v.net/lab-status/status.json (sanitized)
   ========================================================================== */
/* ============ SKIN SYSTEM — build once, reskin many ============ */
:root{
  --void:#0b0c10; --pane:rgba(16,20,28,.82); --pane-2:rgba(22,28,40,.9);
  --seam:#20293c; --seam-hi:#31405f;
  --ink:#d4e2f7; --dim:#7f8fb3; --faint:#4a5878;
  --blu:#25d6ff; --blu-dk:#0e8fb3;
  --org:#ff7a1a; --org-dk:#b34f0a;
  --grn:#39ff6a; --grn-dk:#1a9e40;
  --vio:#b96bff; --red:#ff3b5c; --you:#ff4d92;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
}
:root[data-skin="synthwave"]{
  --void:#0a0616; --pane:rgba(24,14,40,.82); --pane-2:rgba(32,18,54,.9);
  --seam:#31204f; --seam-hi:#4a3178;
  --ink:#e9defc; --dim:#a08cc9; --faint:#5f4a8a;
  --blu:#ff3df0; --blu-dk:#b31ca8; --org:#00e5ff; --org-dk:#0a93a8;
  --grn:#b6ff3d; --grn-dk:#6fae14; --vio:#7c5cff; --red:#ff5c7a; --you:#ff9d2e;
}
:root[data-skin="redline"]{
  --void:#0c0808; --pane:rgba(26,14,12,.85); --pane-2:rgba(36,18,14,.92);
  --seam:#3a201a; --seam-hi:#5c2f22;
  --ink:#f6ddd2; --dim:#b38a7a; --faint:#7a4f42;
  --blu:#ff9d2e; --blu-dk:#b36a12; --org:#ff4d2e; --org-dk:#b32912;
  --grn:#ffd24d; --grn-dk:#b3901c; --vio:#ff7a5c; --red:#ff2e2e; --you:#ff5c8a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overscroll-behavior:none;touch-action:manipulation;-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(900px 500px at 80% -10%,color-mix(in srgb,var(--org) 6%,transparent),transparent 55%),
    radial-gradient(800px 600px at 5% 110%,color-mix(in srgb,var(--blu) 7%,transparent),transparent 55%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 44px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0 1px,transparent 1px 44px),
    var(--void);
  color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased;overflow:hidden;
}
.scan{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:.4;mix-blend-mode:multiply;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 1px,transparent 1px,transparent 3px)}
.vig{position:fixed;inset:0;z-index:60;pointer-events:none;box-shadow:inset 0 0 220px 40px rgba(0,0,0,.85)}
#grain{position:fixed;inset:0;width:100%;height:100%;z-index:58;pointer-events:none;
  opacity:.06;mix-blend-mode:overlay;image-rendering:pixelated}
.world.cut{animation:camcut .32s ease}
@keyframes camcut{0%{filter:brightness(1.55) saturate(1.5);transform:scale(1.02)}100%{filter:none;transform:none}}
#roomTint{position:absolute;inset:0;z-index:3;pointer-events:none;transition:background 1.2s ease;
  background:radial-gradient(80% 70% at 50% 30%,color-mix(in srgb,var(--tc,var(--blu)) 7%,transparent),transparent 75%)}
.orb{position:absolute;width:8px;height:8px;border-radius:50%;z-index:7;background:var(--org);
  box-shadow:0 0 16px 5px color-mix(in srgb,var(--org) 55%,transparent);animation:orbrun 9s ease-in-out infinite}
.orb.o2{animation-delay:-4.5s}
@keyframes orbrun{
  0%{left:16%;top:58%;opacity:0}8%{opacity:1}
  32%{left:36%;top:72%}62%{left:64%;top:70%}
  82%{left:86%;top:50%;opacity:1}92%,100%{left:88%;top:42%;opacity:0}}

/* ================= ACCESS GATE ================= */
#gate{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:var(--void)}
#gate .term{width:min(360px,92vw);border:1px solid var(--seam-hi);border-radius:12px;padding:26px 24px;
  background:var(--pane-2);box-shadow:0 0 70px -18px color-mix(in srgb,var(--blu) 40%,transparent),inset 0 0 30px rgba(0,0,0,.5)}
#gate h1{margin:0 0 2px;font:700 15px/1.2 var(--mono);letter-spacing:.32em;color:var(--blu);text-shadow:0 0 12px color-mix(in srgb,var(--blu) 60%,transparent)}
#gate .sub{font-size:10px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;margin-bottom:20px}
#gate .slots{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
#gate .slot{width:44px;height:54px;border:1px solid var(--seam-hi);border-radius:8px;background:var(--void);
  display:grid;place-items:center;font:700 22px var(--mono);color:var(--blu)}
#gate .slot.on{border-color:var(--blu-dk);box-shadow:0 0 16px -4px var(--blu)}
#gate .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
#gate .pad button{padding:13px 0;border-radius:8px;border:1px solid var(--seam-hi);cursor:pointer;
  background:linear-gradient(180deg,var(--pane-2),var(--void));color:var(--ink);font:600 16px var(--mono);transition:.12s}
#gate .pad button:hover{border-color:var(--blu);color:#fff}
#gate .pad button:active{transform:translateY(1px)}
#gate .msg{margin-top:14px;text-align:center;font-size:10px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;min-height:14px}
#gate.deny .term{animation:shake .4s}
@keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
#boot{position:fixed;inset:0;z-index:90;background:var(--void);display:none;flex-direction:column;justify-content:center;
  padding:0 clamp(20px,20vw,300px);font:12px/2 var(--mono);color:var(--grn)}
#boot.on{display:flex}
#boot .bl{white-space:nowrap;overflow:hidden;text-shadow:0 0 8px color-mix(in srgb,var(--grn) 50%,transparent)}

/* ================= APP FRAME ================= */
#app{display:none;height:100vh;height:100dvh;flex-direction:column}
#app.on{display:flex}
.hud{flex:none;display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--seam);
  background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0) 55%),var(--pane-2);
  backdrop-filter:blur(10px) saturate(1.25);-webkit-backdrop-filter:blur(10px) saturate(1.25);z-index:40}
.hud .logo{font:700 13px var(--mono);letter-spacing:.3em;white-space:nowrap}
.hud .logo b{color:var(--blu);text-shadow:0 0 10px color-mix(in srgb,var(--blu) 70%,transparent)}
.hud .sub{font-size:9px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
.hud .sp{flex:1}
.chip{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;padding:5px 10px;border-radius:999px;
  border:1px solid var(--seam-hi);color:var(--dim);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.chip .led{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 9px var(--grn);animation:pulse 2.2s infinite}
.chip.sim{color:#ffd24d;border-color:rgba(255,210,77,.4)}
.chip.sim .led{background:#ffd24d;box-shadow:0 0 8px #ffd24d}
.chip.live{color:var(--grn);border-color:color-mix(in srgb,var(--grn) 40%,transparent)}
.chip.you{color:var(--you);border-color:rgba(255,77,146,.4)}
.chip.btn{cursor:pointer;transition:.13s}
.chip.btn:hover{color:#fff;border-color:var(--blu);box-shadow:0 0 12px -4px var(--blu)}
.clock{font:600 12px var(--mono);color:var(--dim);font-variant-numeric:tabular-nums}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.frame{flex:1;display:flex;min-height:0}

/* ================= CREW SIDEBAR ================= */
.crew{flex:none;width:230px;border-right:1px solid var(--seam);background:var(--pane);
  display:flex;flex-direction:column;min-height:0;z-index:30}
.crew .hd{padding:10px 14px 8px;font-size:9.5px;letter-spacing:.26em;color:var(--faint);text-transform:uppercase;
  border-bottom:1px solid var(--seam)}
.roster{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
.acard{position:relative;display:flex;gap:10px;align-items:center;padding:9px 10px;border-radius:9px;cursor:pointer;
  border:1px solid var(--seam);background:rgba(255,255,255,.015);transition:.14s}
.acard:hover{border-color:var(--ac);box-shadow:0 0 16px -6px var(--ac),inset 0 0 14px rgba(0,0,0,.4)}
.acard:hover .nm{color:#fff}
.acard.sel{border-color:var(--ac);background:linear-gradient(90deg,color-mix(in srgb,var(--ac) 10%,transparent),transparent 60%);
  box-shadow:0 0 18px -6px var(--ac)}
.acard .av{width:36px;height:36px;flex:none;border-radius:8px;display:grid;place-items:center;font-size:19px;
  border:1px solid var(--seam-hi);background:var(--pane-2);box-shadow:0 0 12px -5px var(--ac)}
.acard .nm{font:700 11.5px var(--mono);letter-spacing:.14em;transition:.14s}
.acard .rl{font-size:8.5px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;margin-top:2px}
.acard .st{font-size:9px;color:var(--dim);margin-top:3px;max-width:132px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acard .led{position:absolute;top:9px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--lc,var(--grn));
  box-shadow:0 0 9px var(--lc,var(--grn));animation:pulse 2s infinite}
.acard .badge{position:absolute;top:8px;right:8px;font-size:7px;letter-spacing:.14em;color:var(--grn);
  border:1px solid color-mix(in srgb,var(--grn) 45%,transparent);border-radius:4px;padding:1px 4px;background:rgba(0,0,0,.4)}
.acard.slotcard{border-style:dashed;opacity:.75}
.acard.slotcard .av{border-style:dashed;font-size:15px;color:var(--faint)}
.acard.slotcard .led{display:none}
.crew .ft{border-top:1px solid var(--seam);padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.crew .ft .r{display:flex;justify-content:space-between;font-size:9.5px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
.crew .ft .r b{color:var(--dim);font-variant-numeric:tabular-nums}

/* ================= WORLD VIEWPORT ================= */
.world{flex:1;position:relative;min-width:0;overflow:hidden;background:#07080c}
.room{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .35s}
.room.on{opacity:1;pointer-events:auto}
.wall{position:absolute;left:0;right:0;top:0;height:64px;border-bottom:2px solid var(--seam-hi);
  background:linear-gradient(180deg,#10141d,#0a0d13);display:flex;align-items:center;gap:18px;padding:0 22px;z-index:5}
.wall .rname{font:700 clamp(14px,2vw,19px) var(--mono);letter-spacing:.34em;color:var(--ac);
  text-shadow:0 0 16px color-mix(in srgb,var(--ac) 70%,transparent)}
.wall .rtag{font-size:9px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase}
.wall .slit{flex:1;height:22px;border:1px solid var(--seam);border-radius:4px;overflow:hidden;position:relative;background:#05070a;max-width:340px}
.wall .slit::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--ac) 35%,transparent),transparent);
  transform:translateX(-100%);animation:sweepx 4.5s linear infinite}
@keyframes sweepx{to{transform:translateX(100%)}}
.floorp{position:absolute;left:0;right:0;top:64px;bottom:0;
  background:
    radial-gradient(60% 55% at 50% 42%,color-mix(in srgb,var(--ac) 7%,transparent),transparent 70%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 1px,transparent 1px 56px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.028) 0 1px,transparent 1px 56px),
    repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0 1px,transparent 1px 14px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.012) 0 1px,transparent 1px 14px),
    linear-gradient(180deg,#0b0e15,#080a0f)}
.floorp::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 140px 20px rgba(0,0,0,.7);pointer-events:none}
.room.hexfloor .floorp{background:
    radial-gradient(60% 55% at 50% 42%,color-mix(in srgb,var(--ac) 8%,transparent),transparent 70%),
    repeating-linear-gradient(30deg,rgba(255,255,255,.02) 0 1px,transparent 1px 30px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 1px,transparent 1px 30px),
    repeating-linear-gradient(150deg,rgba(255,255,255,.02) 0 1px,transparent 1px 30px),
    linear-gradient(180deg,#0b0e15,#080a0f)}
.stage{position:absolute;left:50%;top:50%;width:720px;height:430px;
  transform:translate(-50%,-50%) scale(var(--sc,1));pointer-events:none;--inv:1}
.stage .tag{transform:translateX(-50%) scale(var(--inv));transform-origin:bottom center}
.stage .plate,.stage .say{transform:scale(var(--inv));transform-origin:bottom center}
/* honesty tag on decorated rooms */
.decor-note{position:absolute;right:10px;bottom:8px;z-index:8;font-size:8px;letter-spacing:.14em;
  color:var(--faint);text-transform:uppercase;border:1px dashed var(--seam-hi);border-radius:4px;padding:2px 6px;background:rgba(0,0,0,.45)}
/* empty slot room */
.slotroom{position:absolute;inset:64px 0 0 0;display:grid;place-items:center}
.slotbox{width:min(440px,84%);border:2px dashed var(--seam-hi);border-radius:14px;padding:28px 26px;text-align:center;
  background:rgba(255,255,255,.012)}
.slotbox .big{font:700 15px var(--mono);letter-spacing:.3em;color:var(--faint)}
.slotbox p{font-size:11px;line-height:1.7;color:var(--dim);margin:12px 0 0}
.slotbox p b{color:var(--ink)}

/* ---------- machinery ---------- */
.mach{position:absolute;z-index:6;filter:drop-shadow(0 10px 14px rgba(0,0,0,.6))}
.mach .top{position:relative;border:1px solid var(--seam-hi);border-radius:6px;
  background:linear-gradient(160deg,#1a2233,#101623);width:100%;height:100%;overflow:hidden}
.mach .front{height:11px;margin-top:-1px;border:1px solid #141b2a;border-top:0;border-radius:0 0 6px 6px;
  background:linear-gradient(180deg,#0c111c,#070a10)}
.mach .tag{position:absolute;left:50%;top:-17px;white-space:nowrap;
  font-size:8px;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
.mach .ledrow{position:absolute;bottom:4px;left:6px;display:flex;gap:4px}
.mach .ledrow i{width:4px;height:4px;border-radius:50%;background:var(--mc,var(--blu));box-shadow:0 0 6px var(--mc,var(--blu));animation:pulse var(--pt,1.6s) infinite}
.mach .ledrow i:nth-child(2){animation-delay:.4s}.mach .ledrow i:nth-child(3){animation-delay:.9s}
.mach.glow .top{box-shadow:0 0 26px -6px var(--mc,var(--blu)),inset 0 0 18px rgba(0,0,0,.55)}
.mach.holo .top{border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 50% 40%,#15202f,#0d1320)}
.mach.holo .front{display:none}
.mach.holo .ring{position:absolute;border:1px dashed color-mix(in srgb,var(--mc) 65%,transparent);border-radius:50%;animation:spin 9s linear infinite}
.mach.holo .ring.r2{animation-duration:14s;animation-direction:reverse;border-style:dotted}
.mach.holo .corepip{width:10px;height:10px;border-radius:50%;background:var(--mc);box-shadow:0 0 18px 4px color-mix(in srgb,var(--mc) 60%,transparent);animation:pulse 2.4s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mach.screen .top{display:flex;align-items:flex-end;gap:3px;padding:5px 6px}
.mach.screen .top i{flex:1;background:linear-gradient(180deg,var(--mc),transparent);transform-origin:bottom;animation:eq 2.2s ease-in-out infinite}
@keyframes eq{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(var(--eh,.9))}}
.mach.console .top::before{content:"";position:absolute;inset:4px 4px 40% 4px;border-radius:3px;
  background:linear-gradient(180deg,color-mix(in srgb,var(--mc) 24%,#0a0f18),#0a0f18);animation:flick 5s steps(2) infinite}
.mach.console .top::after{content:"";position:absolute;left:4px;right:4px;bottom:4px;height:26%;border-radius:2px;
  background:repeating-linear-gradient(90deg,#1a2436 0 5px,#131b2b 5px 10px)}
@keyframes flick{0%,94%,100%{opacity:1}96%{opacity:.6}}
.mach.forge .top::before{content:"";position:absolute;left:18%;right:18%;top:12%;height:36%;border-radius:3px;
  background:linear-gradient(180deg,#232d42,#141b2b);animation:press 2.8s ease-in-out infinite;transform-origin:top}
.mach.forge .top::after{content:"";position:absolute;left:24%;right:24%;bottom:12%;height:20%;border-radius:3px;
  background:var(--mc);opacity:.7;box-shadow:0 0 22px 5px color-mix(in srgb,var(--mc) 55%,transparent);animation:heat 2.8s ease-in-out infinite}
@keyframes press{0%,100%{transform:scaleY(.6)}45%,55%{transform:scaleY(1.05)}}
@keyframes heat{0%,100%{opacity:.35}50%{opacity:.9}}
.mach.belt .top{background:repeating-linear-gradient(90deg,#161e30 0 16px,#0e1524 16px 32px);animation:beltmove 1.4s linear infinite;overflow:visible}
@keyframes beltmove{to{background-position:32px 0}}
.mach.belt .crate{position:absolute;top:50%;width:22px;height:16px;transform:translateY(-58%);border-radius:3px;
  border:1px solid var(--org-dk);background:linear-gradient(160deg,#2b1f10,#1c1408);box-shadow:0 0 10px -3px var(--org);
  animation:crate 7s linear infinite}
.mach.belt .crate::after{content:"▦";position:absolute;inset:0;display:grid;place-items:center;font-size:9px;color:var(--org)}
.mach.belt .crate.c2{animation-delay:-2.3s}.mach.belt .crate.c3{animation-delay:-4.6s}
@keyframes crate{from{left:-6%}to{left:102%;opacity:1}}
.mach.scan1 .top{background:transparent;border:0;overflow:visible}
.mach.scan1 .front{display:none}
.mach.scan1 .post{position:absolute;top:0;bottom:0;width:8px;border:1px solid var(--seam-hi);border-radius:3px;background:linear-gradient(180deg,#1c2536,#101725)}
.mach.scan1 .post.pr{right:0}
.mach.scan1 .bar{position:absolute;left:0;right:0;top:0;height:8px;border:1px solid var(--seam-hi);border-radius:3px;background:#141c2c}
.mach.scan1 .beam{position:absolute;left:8px;right:8px;top:10px;bottom:0;overflow:hidden}
.mach.scan1 .beam::after{content:"";position:absolute;left:0;right:0;height:2px;background:var(--grn);box-shadow:0 0 12px 2px color-mix(in srgb,var(--grn) 60%,transparent);animation:beamy 2.1s ease-in-out infinite}
@keyframes beamy{0%,100%{top:0}50%{top:96%}}
.mach.crates .top{background:transparent;border:0}
.mach.crates .front{display:none}
.mach.crates .bx{position:absolute;border:1px solid var(--org-dk);border-radius:3px;background:linear-gradient(160deg,#241a0d,#170f06);display:grid;place-items:center;font-size:9px;color:var(--org)}
.mach.rack .top{padding:4px;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;align-content:start}
.mach.rack .top i{height:5px;border-radius:2px;background:#101724;position:relative}
.mach.rack .top i::after{content:"";position:absolute;right:1px;top:1px;bottom:1px;width:3px;border-radius:1px;background:var(--rl,var(--grn));box-shadow:0 0 5px var(--rl,var(--grn));animation:pulse var(--pd,1.8s) infinite}
.dline{position:absolute;z-index:4;background:repeating-linear-gradient(90deg,color-mix(in srgb,var(--ac) 55%,transparent) 0 8px,transparent 8px 16px);
  height:2px;opacity:.5;animation:flowx 1.1s linear infinite}
.dline.v{width:2px;background:repeating-linear-gradient(0deg,color-mix(in srgb,var(--ac) 55%,transparent) 0 8px,transparent 8px 16px);animation:flowy 1.1s linear infinite}
@keyframes flowx{to{background-position:16px 0}}
@keyframes flowy{to{background-position:0 16px}}

/* ---------- agent entity ---------- */
.ent{position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center;gap:4px;
  transform:translate(-50%,-100%);transition:left var(--mt,3s) ease-in-out,top var(--mt,3s) ease-in-out;will-change:left,top}
.ent .plate{font-size:8.5px;letter-spacing:.16em;padding:2px 7px;border-radius:4px;white-space:nowrap;
  border:1px solid color-mix(in srgb,var(--ac) 55%,transparent);color:var(--ac);background:rgba(11,12,16,.9);
  text-shadow:0 0 8px color-mix(in srgb,var(--ac) 60%,transparent)}
.ent .say{font-size:8.5px;color:var(--dim);background:rgba(11,12,16,.92);border:1px solid var(--seam-hi);

<body>
<div class="scan" aria-hidden="true"></div>
<div class="vig" aria-hidden="true"></div>
<canvas id="grain" aria-hidden="true"></canvas>

<!-- ============ GATE ============ -->
<div id="gate">
  <div class="term">
    <h1>THE LAB</h1>
    <div class="sub">restricted facility · keycode required</div>
    <div class="slots"><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div></div>
    <div class="pad">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button data-k="clr">CLR</button><button>0</button><button data-k="del">⌫</button>
    </div>
    <div class="msg" id="gateMsg">enter 4-digit keycode</div>
  </div>
</div>
<div id="boot" aria-hidden="true"></div>

<!-- ============ APP ============ -->
<div id="app">
  <header class="hud">
    <span class="logo">THE&nbsp;<b>LAB</b></span>
    <span class="sub">2 live agents · 2 open slots</span>
    <span class="sp"></span>
    <span class="chip sim" id="feedChip"><span class="led"></span><span id="feedLbl">NO FEED</span></span>
    <span class="chip" id="spendChip"><span class="led" style="background:var(--org);box-shadow:0 0 8px var(--org)"></span>LAST SHIFT <b id="hudSpend" style="color:var(--ink)">$—</b></span>
    <span class="chip you">REVIEW <b id="hudQueue">—</b></span>
    <span class="chip btn" id="adminBtn" role="button" tabindex="0">⚙ ADMIN</span>
    <span class="chip btn" id="skinBtn" role="button" tabindex="0" title="cycle facility skin">◐ <b id="skinLbl">NIGHTSHIFT</b></span>
    <span class="clock" id="clock">00:00:00</span>
  </header>

  <div class="frame">
    <aside class="crew">
      <div class="hd">CREW — 2 LIVE / 2 SLOTS</div>
      <div class="roster" id="roster"></div>
      <div class="ft">
        <div class="r"><span>next shift</span><b id="ftShift">--:--:--</b></div>
        <div class="r"><span>next standup</span><b id="ftStand">--:--:--</b></div>
        <div class="r"><span>est. burn</span><b id="ftBurn">~$1-1.50/day</b></div>
      </div>
    </aside>

    <div class="world" id="world">
      <div id="roomTint" aria-hidden="true"></div>
      <section class="view" id="view-admin" style="position:absolute;inset:0;z-index:12;display:none;background:rgba(7,8,12,.97)">
        <div class="admin" id="adminBody"></div>
      </section>
      <div id="winWrap" style="position:absolute;inset:0;pointer-events:none">
        <div class="win" id="winComms" style="--wc:var(--grn);right:14px;bottom:14px;pointer-events:auto">
          <div class="tbar" data-drag="winComms"><span class="ti">◤ EVENT LOG</span><span class="sp"></span><button data-min="winComms">–</button></div>
          <div class="body" id="commsBody"></div>
        </div>
        <div class="win" id="winOps" style="--wc:var(--blu);left:14px;top:78px;pointer-events:auto">
          <div class="tbar" data-drag="winOps"><span class="ti" id="opsTitle">◤ ROOM OPERATIONS</span><span class="sp"></span><button data-min="winOps">–</button></div>
          <div class="body" id="opsBody"></div>
        </div>
      </div>
    </div>
  </div>

  <nav class="dock" id="dock" aria-label="crew dock"></nav>
</div>

<script>
(function(){
"use strict";
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
const $=(s,r)=> (r||document).querySelector(s);

/* ============ GATE ============ */
const PIN="8520";let buf="";
const gate=$("#gate"),slots=gate.querySelectorAll(".slot");
const paint=()=>slots.forEach((s,i)=>{s.textContent=buf[i]?"•":"";s.classList.toggle("on",!!buf[i])});
function tryPin(){
  if(buf.length!==4)return;
  if(buf===PIN){sessionStorage.setItem("lab-key","1");$("#gateMsg").textContent="ACCESS GRANTED";
    gate.style.transition="opacity .4s";gate.style.opacity="0";setTimeout(()=>{gate.remove();bootSeq()},420)}
  else{gate.classList.add("deny");$("#gateMsg").textContent="ACCESS DENIED";
    setTimeout(()=>{gate.classList.remove("deny");buf="";paint()},450)}
}
gate.addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  const k=b.getAttribute("data-k")||b.textContent;
  if(k==="clr")buf="";else if(k==="del")buf=buf.slice(0,-1);else if(buf.length<4)buf+=k;
  paint();tryPin();
});
document.addEventListener("keydown",e=>{
  if(!document.body.contains(gate))return;
  if(/^[0-9]$/.test(e.key)&&buf.length<4){buf+=e.key;paint();tryPin()}
  if(e.key==="Backspace"){buf=buf.slice(0,-1);paint()}
});

/* ============ BOOT ============ */
function bootSeq(){
  if(reduce){start();return}
  const b=$("#boot");b.classList.add("on");
  const lines=["> LAB-OS v3 — honest edition","> live agents: theo, vulcan ........ OK",
    "> open division slots: 2","> telemetry uplink ................. checking",
    "> WELCOME, OPERATOR"];
  let i=0;
  (function next(){
    if(i>=lines.length){setTimeout(()=>{b.classList.remove("on");start()},240);return}
    const d=document.createElement("div");d.className="bl";d.textContent=lines[i++];
    b.appendChild(d);setTimeout(next,120);
  })();
}
if(sessionStorage.getItem("lab-key")==="1"){gate.remove();bootSeq()}

/* ================================================================
   LAB CONFIG — the honest inventory.
   kind:"live"  = a real OpenClaw agent on the VPS
   kind:"slot"  = an empty template; nothing runs
   Machines/sprites are DECORATION and each room says so on the wall.
   ================================================================ */
const ROOMS={
  theo:{kind:"live",name:"CEO COMMAND",tag:"real agent · office visuals are decor",ac:"var(--blu)",hex:true,
    machines:[
      ["screen",50,4,300,44,"MARKET WALL","var(--blu)"],
      ["holo",46,42,150,150,"HOLO TABLE","var(--blu)"],
      ["console",12,30,90,54,"DIRECTIVES","var(--blu)"],
      ["console",80,32,90,54,"REPORTS","var(--blu)"],
      ["rack",88,74,64,80,"ARCHIVE","var(--blu)"]],
    lines:[[20,62,26,0],[62,50,18,0]],
    agent:{glyph:"🦊",name:"THEO",path:[[24,66],[46,72],[68,58],[46,40]]},
    ops:{pill:"SCHEDULED",timer:"stand",
      kpis:[["Real job","reads reports<small>, briefs you</small>"],["Wakes","13:30<small> CT daily</small>"],["Delivers to","Telegram"],["Can spend","$0"]],
      upgs:[["📊","READS","lab-status/*.json on the VPS"],["📨","WRITES","one ≤12-line brief to Parker"],["🧭","MAY WRITE","directives for divisions"]],
      wire:"Theo runs ONCE per day at 13:30 CT. Between wake-ups he is not running. He cannot build, publish, or spend."}},
  vulcan:{kind:"live",name:"FOUNDRY",tag:"real agent · one wake-up/day · machines are decor",ac:"var(--org)",
    machines:[
      ["screen",18,4,170,40,"TREND RECON","var(--org)"],
      ["forge",14,36,110,84,"BUILD PRESS","var(--org)"],
      ["belt",46,58,320,34,"PRODUCTION LINE","var(--org)"],
      ["scan1",63,44,90,96,"QC SCANNER","var(--grn)"],
      ["crates",87,30,90,80,"REVIEW BAY","var(--org)"],
      ["console",84,78,90,50,"LEARNINGS","var(--org)"]],
    lines:[[27,50,0,16],[36,74,10,0]],
    agent:{glyph:"⚒️",name:"VULCAN",path:[[20,80],[38,62],[58,78],[80,60],[52,46]]},
    ops:{pill:"SHIFT ARMED",timer:"shift",
      kpis:[["Staged for you","<span data-live=\"staged\">—</span>"],["Last shift spend","<span data-live=\"spend\">—</span>"],["Cap per shift","$1"],["Wakes","12:00<small> CT daily</small>"]],
      queue:null,
      upgs:[["🔍","PHASE 1 · RESEARCH","web search: what's selling"],["⚒️","PHASE 2 · BUILD","files in his VPS workspace"],["✅","PHASE 3 · QC + STAGE","adds to your review queue"],["📝","PHASE 4 · REPORT","learnings + status file"]],
      wire:"The four phases happen inside ONE agent wake-up (~10 min). The stations above are a visualization of that loop, not separate workers. Vulcan cannot publish — his work stops at the review queue."}},
  slota:{kind:"slot",name:"DIVISION SLOT A",tag:"empty template — nothing runs here",ac:"var(--vio)",
    ops:{pill:"EMPTY",timer:null,
      kpis:[["Status","<small>no agent</small>"],["Cost","$0"],["Runs","never"],["Owner","—"]],
      upgs:[],wire:"To activate: tell Claude to hire a president for this slot — that creates a real OpenClaw agent + charter + daily cron, and this room comes alive with its real data. Until then it costs and does nothing."}},
  slotb:{kind:"slot",name:"DIVISION SLOT B",tag:"empty template — nothing runs here",ac:"var(--grn)",
    ops:{pill:"EMPTY",timer:null,
      kpis:[["Status","<small>no agent</small>"],["Cost","$0"],["Runs","never"],["Owner","—"]],
      upgs:[],wire:"Same as Slot A. Ideas Parker has floated: content/social division, Clockworks lead-watch desk. Neither exists yet — that's a deliberate choice, not a bug."}}
};
const ORDER=["theo","vulcan","slota","slotb"];
const CREW={
  theo:{nm:"THEO",rl:"CEO · openclaw `main`",st:"wakes 13:30 CT — telegram brief"},
  vulcan:{nm:"VULCAN",rl:"foundry · openclaw `foundry`",st:"wakes 12:00 CT — builds 1 product"},
  slota:{nm:"OPEN SLOT",rl:"division a — unassigned",st:"tap to see how to activate",slot:true},
  slotb:{nm:"OPEN SLOT",rl:"division b — unassigned",st:"tap to see how to activate",slot:true}
};
const state={spend:null,queue:null,room:null,feed:"none",meta:null};

/* ============ ROSTER + DOCK ============ */
function buildRoster(){
  $("#roster").innerHTML=ORDER.map(k=>{
    const c=CREW[k],r=ROOMS[k];
    if(c.slot)return `<div class="acard slotcard" data-k="${k}" tabindex="0" style="--ac:${r.ac}">
      <div class="av">＋</div>
      <div><div class="nm">${c.nm}</div><div class="rl">${c.rl}</div><div class="st">${c.st}</div></div></div>`;
    return `<div class="acard" data-k="${k}" tabindex="0" style="--ac:${r.ac}">
      <div class="av">${r.agent.glyph}</div>
      <div><div class="nm">${c.nm}</div><div class="rl">${c.rl}</div><div class="st" data-st="${k}">${c.st}</div></div>
      <span class="badge">LIVE</span></div>`;
  }).join("");
  $("#roster").addEventListener("click",e=>{
    const c=e.target.closest(".acard");if(c)selectRoom(c.getAttribute("data-k"));
  });
  $("#roster").addEventListener("keydown",e=>{
    const c=e.target.closest(".acard");
    if(c&&(e.key==="Enter"||e.key===" ")){e.preventDefault();selectRoom(c.getAttribute("data-k"))}
  });
}
function buildDock(){

/* ============ WINDOWS DRAG ============ */
function drags(){
  let drag=null;
  document.querySelectorAll(".tbar").forEach(t=>{
    t.addEventListener("pointerdown",e=>{
      if(e.target.closest("button"))return;
      if(isMobile())return;
      const w=$("#"+t.getAttribute("data-drag")),wr=$("#world").getBoundingClientRect(),r=w.getBoundingClientRect();
      w.style.left=(r.left-wr.left)+"px";w.style.top=(r.top-wr.top)+"px";w.style.right="auto";w.style.bottom="auto";
      drag={w,dx:e.clientX-r.left,dy:e.clientY-r.top,wr};
      document.querySelectorAll(".win").forEach(x=>x.classList.remove("focus"));
      w.classList.add("focus");w.style.zIndex=25;
      document.querySelectorAll(".win").forEach(x=>{if(x!==w)x.style.zIndex=20});
      t.setPointerCapture(e.pointerId);
    });
    t.addEventListener("pointermove",e=>{
      if(!drag)return;
      const {w,dx,dy,wr}=drag,r=w.getBoundingClientRect();
      let L=e.clientX-wr.left-dx,T=e.clientY-wr.top-dy;
      L=Math.max(4,Math.min(L,wr.width-r.width-4));T=Math.max(4,Math.min(T,wr.height-r.height-4));
      w.style.left=L+"px";w.style.top=T+"px";
    });
    t.addEventListener("pointerup",()=>{drag=null});
  });
  document.querySelectorAll("[data-min]").forEach(b=>{
    b.addEventListener("click",()=>{const w=$("#"+b.getAttribute("data-min"));
      if(isMobile()){w.classList.remove("open");return}
      w.classList.toggle("min");
      b.textContent=w.classList.contains("min")?"+":"–"});
  });
}

/* ============ REAL COUNTDOWNS (12:00 + 13:30 America/Chicago) ============ */
function nextCT(h,m){
  const now=new Date();
  const ct=new Date(now.toLocaleString("en-US",{timeZone:"America/Chicago"}));
  const tgt=new Date(ct);tgt.setHours(h,m,0,0);
  if(tgt<=ct)tgt.setDate(tgt.getDate()+1);
  return tgt-ct;
}
function fmtMs(ms){const s=Math.floor(ms/1000),p=n=>(n<10?"0":"")+n;
  return p(Math.floor(s/3600))+":"+p(Math.floor(s%3600/60))+":"+p(s%60)}
function startTimers(){
  const tick=()=>{
    const sh=fmtMs(nextCT(12,0)),st=fmtMs(nextCT(13,30));
    const fs=$("#ftShift");if(fs)fs.textContent=sh;
    const ft=$("#ftStand");if(ft)ft.textContent=st;
    document.querySelectorAll("[data-tmr]").forEach(t=>{t.innerHTML="T-<b>"+(t.getAttribute("data-tmr")==="shift"?sh:st)+"</b>"});
    document.querySelectorAll("[data-tmr2]").forEach(t=>{t.textContent=t.getAttribute("data-tmr2")==="shift"?sh:st});
    const d=new Date(),p=n=>(n<10?"0":"")+n;
    $("#clock").textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  };
  tick();setInterval(tick,1000);
  setInterval(refreshBubbles,5000);refreshBubbles();
}

const FEEDS=["data/status.json","https://pool.gs-v.net/lab-status/status.json"];
let lastGen=null;
function fetchFeed(i){
  if(i>=FEEDS.length)return Promise.reject(0);
  return fetch(FEEDS[i],{cache:"no-store"}).then(r=>{if(!r.ok)throw 0;return r.json()})
    .catch(()=>fetchFeed(i+1));
}
function applyLive(j){
  if(!j)return;
  const first=state.feed!=="live";
  if(j.generated_at===lastGen&&!first)return;
  lastGen=j.generated_at||"static";
  state.feed="live";state.meta=j.meta||state.meta;
  $("#feedLbl").textContent="LIVE FEED";
  $("#feedChip").classList.remove("sim");$("#feedChip").classList.add("live");
  if(j.foundry){
    const f=j.foundry;
    state.vulcanTask=f.current_task||null;
    if(f.current_task){const st=document.querySelector('[data-st="vulcan"]');if(st)st.textContent=f.current_task}
    state.queueItems=(f.staged_for_review||[]).map(p=>[p.name,"$"+p.price]);
    state.queue=state.queueItems.length;
    if(typeof f.spend_estimate_usd==="number")state.spend=f.spend_estimate_usd;
    $("#hudQueue").textContent=state.queue;
    $("#hudSpend").textContent=state.spend==null?"$—":"$"+state.spend.toFixed(2);
    if(first){
      pushLog("FEED","live telemetry connected ✓","var(--grn)");
      if(f.shift_ended)pushLog("VULCAN","last shift ended "+f.shift_ended.slice(0,16).replace("T"," ")+" UTC","var(--org)");
      state.queueItems.forEach(q=>pushLog("VULCAN","staged for your review: "+q[0]+" ("+q[1]+")","var(--org)"));
      if(f.learnings)pushLog("VULCAN","learning: "+f.learnings,"var(--org)");
    }else{
      pushLog("FEED","telemetry updated","var(--dim)");
    }
    if(state.room==="vulcan")renderOps("vulcan");
    fillLiveSpans();refreshBubbles();
    if($("#view-admin").style.display==="block")renderAdmin();
  }
}
function tryLive(){
  fetchFeed(0).then(applyLive).catch(()=>{
    pushLog("FEED","no telemetry reachable — showing nothing fake, just quiet","var(--faint)");
  });
  setInterval(()=>fetchFeed(0).then(applyLive).catch(()=>{}),90000);
}

/* ============ START ============ */
let started=false;
function start(){
  if(started)return;started=true;
  $("#app").classList.add("on");
  buildRoster();buildRooms();buildDock();drags();startTimers();startWalkers();startGrain();tryLive();
  pushLog("SYS","facility online — 2 live agents, 2 empty slots","var(--dim)");
  const sb=$("#skinBtn");
  sb.addEventListener("click",()=>{skinIdx=(skinIdx+1)%SKINS.length;applySkin(skinIdx)});
  const ab=$("#adminBtn");
  ab.addEventListener("click",showAdmin);
  ab.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();showAdmin()}});
  const m=location.hash.match(/#\/(\w+)/);
  if(m&&m[1]==="admin"){selectRoom("vulcan");showAdmin()}
  else selectRoom(m&&ROOMS[m[1]]?m[1]:"vulcan");
  fitStages();
  addEventListener("resize",fitStages);
  addEventListener("orientationchange",()=>setTimeout(fitStages,220));
  if(window.visualViewport)visualViewport.addEventListener("resize",fitStages);
}
})();
</script>
