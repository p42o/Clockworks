function renderWorksheet(rec){
  const ws=rec.worksheet, k=S.kids.find(x=>x.id===rec.kidId)||activeKid();
  const accs=(k?k.accoms:[]).map(id=>ACCOMMODATIONS.find(a=>a.id===id)).filter(Boolean);
  const accClasses=[...new Set(accs.flatMap(a=>a.render))].join(" ") + (S.bwMode?" bw":"");

  // Shared response renderer. Selectable choices (the child circles one)
  // make MC / phonics / sorting actually doable on paper without art.
  const respBox=(it)=>{
    const opts=Array.isArray(it.options)?it.options.filter(o=>o!=null&&String(o).trim()!==""):[];
    if(opts.length>=2){
      return `<div class="ws-choices">${opts.map(o=>`<span class="ws-choice">${esc(String(o))}</span>`).join("")}</div>`;
    }
    const resp=it.response||"blank";
    if(resp==="tracing") return `<div class="ws-write tracing">${esc(it.tracingText||it.answer||it.prompt)}</div>`;
    if(resp==="lines")   return `<div class="ws-write lines"></div>`;
    if(resp==="grid")    return `<div class="ws-write grid"></div>`;
    if(resp==="hwlines") return `<div class="ws-write hwlines"></div>`;
    if(resp==="blank" && isShortAnswer(it))
      return `<span style="border-bottom:2px solid #999;display:inline-block;min-width:120px;margin-left:8px">&nbsp;</span>`;
    return `<div class="ws-write"></div>`;
  };
  const itemHTML=(it)=>{
    const checkbox = (k&&k.accoms.includes("adhd")) ? `<span style="border:2px solid #7C4DFF;width:18px;height:18px;border-radius:5px;display:inline-block;flex-shrink:0;margin-top:2px"></span>` : "";
    const q=stripMd(it.prompt||"").trim();
    const opt=Array.isArray(it.options)&&it.options.filter(o=>o!=null&&String(o).trim()).length>=2;
    return `<div class="ws-item${opt?' compact':''}">
      ${checkbox}<span class="qn">${it.number}.</span>
      <div class="qbody">
        ${q?`<div class="ws-q">${esc(q)}</div>`:""}
        ${it.hint?`<div class="ws-hint">💡 ${esc(stripMd(it.hint))}</div>`:""}
        ${respBox(it)}
      </div></div>`;
  };
  const wordBankHTML=(wb)=>{
    const w=Array.isArray(wb)?wb.filter(x=>x!=null&&String(x).trim()!==""):[];
    if(!w.length) return "";
    return `<div class="ws-wordbank"><span class="wb-label">Word Bank</span>${w.map(x=>`<span class="wb-w">${esc(String(x))}</span>`).join("")}</div>`;
  };

  const guard=_frustrationGuard; _frustrationGuard=null;
  const guardBanner = guard ? `
    <div style="background:#fff7e6;border:3px solid var(--sun);border-radius:16px;padding:16px 18px;margin-bottom:14px">
      <div style="font-weight:900;color:#a9740a;font-size:1.05rem">💛 A note for the grown-up</div>
      <p style="margin:6px 0 0;font-weight:700;color:var(--ink)">
        ${esc(k?k.name:"Your learner")} has had a couple of tough sessions on <b>${esc(guard.skill)}</b> in a row.
        This sheet is <b>deliberately a confidence-builder</b> — well below the struggle point, near-certain success.
        Sit with them, keep it light and warm, and celebrate effort over answers. If frustration shows again,
        <b>take a real break from this skill</b> for a day or two and come back — pushing through repeated failure
        backfires. Switching to a different subject they enjoy is a great next move.
      </p>
    </div>` : "";
  document.getElementById("screen-worksheet").innerHTML=`
    ${guardBanner}
    <div class="ws-actions">
      <button class="btn" onclick="savePDF()">⬇️ Save as PDF</button>
      <button class="btn sun" onclick="window.print()">🖨️ Print</button>
      <button class="btn coral" onclick="startGrading('${rec.id}')">📸 Grade it</button>
      <button class="btn mint sm" onclick="generate(true,'different')">🔄 New version</button>
      <button class="btn ghost sm" onclick="generate(true,'easier')">😌 Easier</button>
      <button class="btn ghost sm" onclick="generate(true,'harder')">💪 Harder</button>
      <button class="btn ghost sm" onclick="renderReview()">⚙️ Change setup</button>
      <button class="btn ghost sm" onclick="renderWelcome()">🏠 Start over</button>
    </div>
    <p class="no-print muted" style="font-weight:700;margin:-4px 0 14px;font-size:.86rem">
      💾 <b>Save as PDF</b> opens your print box — pick <b>“Save as PDF”</b> (or “PDF → Save as PDF”) as the destination. Page 1 is the child's worksheet; page 2 is the grown-up answer/guide.
    </p>

    <div class="sheet ${accClasses}">
      <div class="ws-header">
        <div>
          <h1 class="ws-title">${esc(ws.title||"Worksheet")}</h1>
          <div class="muted" style="font-weight:800;color:#7C4DFF">${esc(subjLabel(rec.params.subject))} · ${esc(rec.params.skill)} · ${esc(currentThemeOf(rec))}</div>
        </div>
        <div class="ws-meta">⭐ ${gradeLabel(rec.params.grade)}<br>⏱️ ~${ws.estimatedMinutes||10} min<br>🤖 Sprocket</div>
      </div>
      <div class="ws-nameline"><span>Name: <span class="u">&nbsp;</span></span><span>Date: <span class="u">&nbsp;</span></span></div>
      ${rec.image?`<img class="ws-banner" src="${rec.image}" alt="">`:""}

      ${(()=>{
        const hasEx=!!ws.warmUp, hasTog=ws.guidedPractice&&(ws.guidedPractice.items||[]).length;
        const steps=[];
        if(hasEx) steps.push("👀 <b>Look at the Example.</b> It's already done for you — just read it. You do <u>not</u> write there.");
        if(hasTog) steps.push("🤝 <b>Warm Up together.</b> Do these with a grown-up helping.");
        steps.push("✏️ <b>Your Turn.</b> Now do the numbered problems by yourself. Write your answers on the lines.");
        return `<div class="ws-howto">
          <div class="lbl">How to do this page</div>
          <ol>${steps.map(s=>`<li>${s}</li>`).join("")}</ol>
        </div>`;
      })()}

      ${ws.priorKnowledge?`<div class="ws-prior">💡 Before we start: ${esc(stripMd(ws.priorKnowledge))}</div>`:""}

      ${ws.warmUp?`<div class="ws-warm">
        <div class="lbl">👀 Example — just look, don't write here</div>
        <div class="ex-tag">DONE FOR YOU</div>
        <div style="font-weight:800;margin:6px 0">${esc(stripMd(ws.warmUp.exampleProblem))}</div>
        ${ws.warmUp._weak
          ? `<div class="muted" style="font-weight:700">👆 Read this one with a grown-up — it shows you how. You don't write here.</div>`
          : `<div style="white-space:pre-wrap">${esc(stripMd(ws.warmUp.workedSolution))}</div>`}
      </div>`:""}

      ${ws.misconceptionRepair?`<div class="ws-repair">
        <div class="lbl">⚠️ Watch out for a tricky part</div>
        <div style="font-weight:700;margin:6px 0">Careful: ${esc(ws.misconceptionRepair.misconception)}</div>
        <div style="white-space:pre-wrap">✅ ${esc(ws.misconceptionRepair.fix)}</div>
      </div>`:""}

      ${ws.guidedPractice && (ws.guidedPractice.items||[]).length?`<div class="ws-guided">
        <div class="lbl">🤝 Warm Up — do these with a grown-up</div>
        <div class="sec-instr">${esc(stripMd(ws.guidedPractice.instructions||""))}</div>
        ${(ws.guidedPractice.items||[]).map((g,i)=>{ const gq=stripMd(g.prompt||"").trim();
          return `<div class="g-item">
          <div class="ws-q"><b>${i+1}.</b>${gq?" "+esc(gq):""}</div>
          ${g.scaffold?`<div class="g-scaffold">💬 Hint: ${esc(stripMd(g.scaffold))}</div>`:""}
          ${respBox(g)}</div>`; }).join("")}
      </div>`:""}

      <div class="ws-yourturn">✏️ Your Turn — do these by yourself</div>
      ${(ws.sections||[]).map(sec=>`
        <div class="ws-section">
          <h3>${esc(cleanHeading(sec.heading))}</h3>
          <div class="sec-instr">${esc(stripMd(sec.instructions))}</div>
          ${wordBankHTML(sec.wordBank)}
          ${(sec.items||[]).map(itemHTML).join("")}
        </div>`).join("")}

      ${ws.challenge?`<div class="ws-challenge">
        <span class="lbl">🌟 Challenge Star:</span> ${esc(stripMd(ws.challenge.prompt))}
        <div style="margin-top:8px">${respBox(ws.challenge)}</div></div>`:""}

      ${(()=>{ const rf=ws.reflection;
        const feeling = rf && typeof rf==='object' ? rf.feeling : (typeof rf==='string'?rf:"How did this feel?");
        const se = rf && typeof rf==='object' ? rf.selfExplain : "";
        return rf?`<div class="ws-reflect">
          <div style="font-weight:800;color:#5E35E0;margin-bottom:4px">💜 Mistakes help your brain grow — be proud of your thinking!</div>
          ${esc(feeling)}<div class="ws-faces">😀&nbsp;&nbsp;🙂&nbsp;&nbsp;😐&nbsp;&nbsp;🤔</div>
          ${se?`<div style="margin-top:10px;font-weight:700">✏️ ${esc(se)}</div><div class="ws-write lines"></div>`:""}
        </div>`:""; })()}

      <div class="ws-foot">Made just for ${esc(k?k.name:"you")} by Sprocket 🤖 · Worksheet Lab</div>
    </div>

    <div class="grownup-sep no-print">
      <span>👇 Grown-up section below: answers + a teaching guide. Your child only needs the page above. 👆</span>
    </div>

    ${parentGuideHTML(ws,k,accClasses,rec)}`;

  document.getElementById("robot").classList.remove("think");
  document.getElementById("rgear").classList.remove("fast");
  show("worksheet");
  say(`Done! 🎉 A <b>${esc(currentThemeOf(rec))}</b> sheet for <b>${esc(k?k.name:'your learner')}</b>. Print it, or ask me for another version.`,"Tip: 'New version' keeps everything but makes fresh problems.","happy");
}
/* Strip teacher-jargon prefixes the model sometimes adds to headings
   ("YOU DO: …", "Section 2 – …") so the child sheet stays plain. */
function cleanHeading(h){
  return String(h||"Practice").replace(/^\s*(you\s*do|we\s*do|i\s*do|independent(?:\s*practice)?|guided(?:\s*practice)?|section|part|step)\s*\d*\s*[:.\-–—]\s*/i,"").trim() || "Practice";
}
/* Belt-and-suspenders: strip stray markdown the model might still emit
   so it never renders as literal **asterisks** / #hashes on the sheet. */
function stripMd(s){
  return String(s==null?"":s)
    .replace(/\*\*(.+?)\*\*/g,"$1").replace(/__(.+?)__/g,"$1")
    .replace(/(^|\s)[*_]([^*_\n]+)[*_](?=\s|$|[.,!?])/g,"$1$2")
    .replace(/`([^`]+)`/g,"$1").replace(/^\s{0,3}#{1,6}\s+/gm,"").trim();
}
function isShortAnswer(it){ return (it.answer&&String(it.answer).length<=12); }
function currentThemeOf(rec){ return rec.params.theme; }

function closeDrawer(){ document.getElementById("scrim").classList.remove("show"); document.getElementById("drawer").classList.remove("show"); }
function saveSettings(){
  S.apiKey=document.getElementById("set-key").value.trim();
  S.textModel=_readModelField('t')||"gpt-4o";
  S.imageModel=_readModelField('i')||"gpt-image-1";

  save(); applyTheme(); toast("Settings saved ✓"); closeDrawer();
  if(document.getElementById("screen-welcome").classList.contains("hidden")===false) renderWelcome();
}
async function testKey(){
  const el=document.getElementById("set-test");
  const key=document.getElementById("set-key").value.trim();
  if(!key){ el.textContent="Paste a key first."; return; }
  el.textContent="Testing… ⏳";
  try{
    await discoverModels(key);
    refreshModelSelects();
    el.innerHTML='<span style="color:var(--ok);font-weight:800">✓ Key works — loaded '
      +(_liveModels.text.length+_liveModels.image.length)+' models you can use.</span>';
  }catch(e){ el.innerHTML='<span style="color:var(--err);font-weight:800">✗ '+esc(e.message||String(e))+'</span>'; }
}
function reopenHistory(id){ const h=S.history.find(x=>x.id===id); if(h) renderWorksheet(h); }
/* Save as PDF = the browser's print-to-PDF (no libraries, keeps crisp text +
   all our print CSS). Set document.title so the PDF gets a sensible filename. */
function savePDF(){
  const prev=document.title;
  const t=document.querySelector(".sheet .ws-title");
  document.title=((t&&t.textContent.trim())||"Sprocket Worksheet").replace(/[\\/:*?"<>|]/g,"").slice(0,80);
  const restore=()=>{ document.title=prev; window.removeEventListener("afterprint",restore); };
  window.addEventListener("afterprint",restore);
  setTimeout(restore, 60000); // safety net if afterprint never fires
  window.print();
}

function exportAll(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="sprocket-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();

async function startCam(){

function snap(){

function fileImg(e){ const f=e.target.files[0]; if(f) loadImgFile(f); }
function dropImg(e){ e.preventDefault(); e.currentTarget.classList.remove('drag');
  const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith("image/")) loadImgFile(f); }
function loadImgFile(f){
  const r=new FileReader();
  r.onload=ev=>{ const im=new Image(); im.onload=()=>{ _capImg=downscale(im, im.width, im.height, 1280, 0.72); renderCapture("upload"); }; im.src=ev.target.result; };
  r.readAsDataURL(f);
}
function downscale(src, w, h, max, q){
  const sc=Math.min(1, max/Math.max(w,h));
  const c=document.createElement("canvas"); c.width=Math.round(w*sc); c.height=Math.round(h*sc);
  c.getContext("2d").drawImage(src,0,0,c.width,c.height);
  return c.toDataURL("image/jpeg", q);
}
function thumbOf(dataUri){
  return new Promise(res=>{ const im=new Image(); im.onload=()=>res(downscale(im,im.width,im.height,240,0.6)); im.src=dataUri; });

/* ============================================================
   GRADING — vision call
   ============================================================ */
const PATTERN_LIB = {
  math_regrouping:"Regrouping / borrowing-carrying errors",
  math_place_value:"Place-value confusion",
  math_fact_recall:"Shaky basic-fact recall",
  math_operation_confusion:"Mixed up the operation",
  math_wordproblem_setup:"Trouble setting up word problems",
  letter_reversal:"Letter reversals",
  number_reversal:"Number reversals",
  letter_formation:"Letter formation / handwriting",
  number_formation:"Number formation",
  spelling_phonetic:"Phonetic spelling errors",
  reading_detail:"Missed explicit details",
  reading_inference:"Inference difficulty",
  sequencing:"Sequencing / ordering",
  incomplete:"Left items blank",
  stamina_dropoff:"Accuracy drops in later items (stamina)",
  careless:"Right method, careless final answer (rushing)",
  directions:"Didn't follow directions"
};
function buildGradePrompt(rec){
  const ws=rec.worksheet;
  const items=(ws.sections||[]).flatMap(s=>s.items||[]).map(it=>({n:it.number,q:it.prompt,correct:it.answer}));
  if(ws.challenge) items.push({n:"★",q:ws.challenge.prompt,correct:ws.challenge.answer});
  return [
"You are an expert, kind elementary teacher grading a scanned/photographed worksheet a child completed by hand.",
"You are given the answer key. For EACH item: transcribe what the child appears to have written, decide correct/incorrect/blank, and give a 0-1 confidence in your reading of THEIR handwriting (not in the answer).",
"Be charitable with messy handwriting and equivalent forms (e.g., '7' vs '7.0', 'cat' vs 'Cat'). If you genuinely can't read it, mark verdict 'unsure' with low confidence.",
"Also identify recurring ERROR PATTERNS from this list only: "+Object.keys(PATTERN_LIB).join(", ")+".",
"For each pattern give the item numbers and one concrete evidence example.",
"",
"ITEMS + ANSWER KEY:",
JSON.stringify(items),
"",
"Return ONLY JSON: {",
'  "items":[{"n":number|string,"read":string,"verdict":"correct"|"incorrect"|"blank"|"unsure","confidence":number}],',
'  "patterns":[{"id":string,"itemNumbers":[...],"evidence":string,"severity":"low"|"med"|"high"}],',
'  "overall":string  // 2 warm sentences for the parent: what went well + the single best next focus',
"}"
].join("\n");
}

/* ============================================================
   GRADING — commit to mastery model + suggestions
   ============================================================ */
function commitGrades(){
  const rec=S.history.find(x=>x.id===_gradeRecId);
  const k=ensureLearning(S.kids.find(x=>x.id===rec.kidId)); if(!k){ renderWelcome(); return; }
  const items=_grade.items;
  const total=items.length;
  const correct=items.filter(i=>i.finalVerdict==='correct').length;
  const pct=total?Math.round(correct/total*100):0;

  // missed concepts: pull the prompts of wrong/blank items for spaced re-practice
  const allItems=(rec.worksheet.sections||[]).flatMap(s=>s.items||[]);
  const missedConcepts=items.filter(i=>i.finalVerdict!=='correct')
    .map(i=>{ const src=allItems.find(x=>String(x.number)===String(i.n)); return src?src.prompt:null; })
    .filter(Boolean).slice(0,6);

  const sk=skillKey(rec.params.subject, rec.params.skill);
  if(!k.mastery[sk]) k.mastery[sk]={attempts:[]};
  const diff=rec.params.difficulty||"on";
  k.mastery[sk].attempts.push({ date:Date.now(), pct, correct, total, difficulty:diff, worksheetId:rec.id, missedConcepts });
  // robust, difficulty-adjusted, off-day-resistant skill estimate
  k.mastery[sk].score=robustScore(k.mastery[sk]);
  // SM-2-lite: schedule next spaced review based on this attempt
  updateSchedule(k.mastery[sk], diffAdj(pct,diff)>=80);

  // accumulate error patterns (only count ones tied to items actually marked wrong, plus parent overrides)
  const wrongNs=new Set(items.filter(i=>i.finalVerdict!=='correct').map(i=>String(i.n)));
  (_grade.patterns||[]).forEach(p=>{
    if(!PATTERN_LIB[p.id]) return;
    const relevant=(p.itemNumbers||[]).some(n=>wrongNs.has(String(n))) || p.severity==='high';
    if(!relevant) return;
    if(!k.patterns[p.id]) k.patterns[p.id]={count:0,examples:[],status:'observed'};
    k.patterns[p.id].count++; k.patterns[p.id].lastSeen=Date.now();
    if(p.evidence) k.patterns[p.id].examples=[...(k.patterns[p.id].examples||[]),p.evidence].slice(-4);
  });

  // generate approval-gated suggestions when thresholds cross
  const newSugs=[];
  const addSug=(id,type,text,payload)=>{ if(!k.suggestions.some(s=>s.sigId===id&&s.status==='pending')) newSugs.push({id:uid(),sigId:id,type,text,payload,status:'pending'}); };
  Object.entries(k.patterns).forEach(([pid,p])=>{
    if(p.status!=='observed') return;
    if(pid==='letter_reversal' && p.count>=2) addSug('lr','letters',`I keep seeing letter reversals. Add the letters from "${(p.examples||[]).slice(-1)[0]||'b/d'}" to ${k.name}'s focus letters?`,{});
    if(pid==='number_reversal' && p.count>=2) addSug('nr','numbers',`Recurring number reversals. Add them to ${k.name}'s focus numbers?`,{});
    if((pid==='stamina_dropoff'||pid==='incomplete') && p.count>=2 && !k.accoms.includes('focus_endurance'))
      addSug('fe','accom',`${k.name} fades on later items repeatedly. Turn on the "Stamina / staying on task" support?`,{accom:'focus_endurance'});
    if((pid==='reading_detail'||pid==='reading_inference') && p.count>=3 && !k.accoms.includes('tracking'))
      addSug('tk','accom',`Comprehension misses are adding up. Turn on "Reading line-tracking" support, or try a grade lower on reading?`,{accom:'tracking'});
  });
  const m=k.mastery[sk];
  if(m.attempts.length>=2 && m.score<55)
    addSug('rem-'+sk,'remediation',`${k.name} is finding "${rec.params.skill}" tough (avg ${m.score}%). Want a gentler focused catch-up sheet on just this?`,{subject:rec.params.subject,skill:rec.params.skill});
  k.suggestions.push(...newSugs);

  // store a slim grading record (thumb only, not full photo)
  thumbOf(_capImg).then(th=>{
    rec.grading={ at:Date.now(), pct, correct, total,
      items:items.map(i=>({n:i.n,read:i.read,verdict:i.finalVerdict,overridden:!!i.overridden})),
      overall:_grade.overall };
    rec.gradeThumb=th;
    save();
  });
  save();
  logEvent("grade", (rec.params.skill||"")+" → "+pct+"%", { kid:k.name, correct, total });
  renderResults(rec, k, {pct,correct,total,missedConcepts,newSugs});
}

function setAffect(recId, affect, btn){
  const rec=S.history.find(x=>x.id===recId); if(!rec) return;
  const k=ensureLearning(S.kids.find(x=>x.id===rec.kidId)); if(!k) return;
  const mk=k.mastery[skillKey(rec.params.subject,rec.params.skill)];
  if(mk && mk.attempts && mk.attempts.length) mk.attempts[mk.attempts.length-1].affect=affect;
  rec.affect=affect; save();
  if(btn){ [...btn.parentNode.children].forEach(b=>b.classList.add('ghost')); btn.classList.remove('ghost'); btn.classList.add('mint'); }
  // a "lots of tears" session is a strong stop signal regardless of score
  if(affect==='hard') say("Thanks for telling me. Tears mean it's time for a break, not a push. Try a fun subject next, or come back tomorrow. 💛","","");
}

/* ============================================================
   PROGRESS REPORT (kid growth view + parent report, printable)
   ============================================================ */
function renderProgressReport(kidId){
  const k=ensureLearning(S.kids.find(x=>x.id===(kidId||S.activeKidId)));
  if(!k){ toast("Pick a learner first",true); renderWelcome(); return; }
  const skills=Object.entries(k.mastery).filter(([sk,m])=>m.attempts&&m.attempts.length);
  const due=dueReviews(k);
  const totalAttempts=skills.reduce((s,[,m])=>s+m.attempts.length,0);
  const avg = skills.length ? Math.round(skills.reduce((s,[,m])=>s+(robustScore(m)||0),0)/skills.length) : 0;
  const color=v=>v>=80?'var(--mint)':v>=60?'var(--sun)':'var(--coral)';
  const trend=m=>{ const a=m.attempts; if(a.length<2) return ['·','var(--ink-soft)'];
    const d=diffAdj(a[a.length-1].pct,a[a.length-1].difficulty||'on')-diffAdj(a[a.length-2].pct,a[a.length-2].difficulty||'on');
    return d>5?['▲','var(--mint)']:d<-5?['▼','var(--coral)']:['▬','var(--ink-soft)']; };

  // accommodation efficacy: avg robust score of attempts before vs after the latest accom change
  let effHtml="";
  const lastLog=(k.accomLog||[]).slice(-1)[0];
  if(lastLog && (k.accomLog||[]).length>1){
    const cut=lastLog.date;
    const before=[], after=[];
    skills.forEach(([,m])=>m.attempts.forEach(a=>{ const v=diffAdj(a.pct,a.difficulty||'on'); (a.date<cut?before:after).push(v); }));
    const mean=xs=>xs.length?Math.round(xs.reduce((s,x)=>s+x,0)/xs.length):null;
    const b=mean(before), af=mean(after);

    <h3 style="color:var(--grape-dk);margin-top:14px">Skill by skill</h3>
    ${skills.length? skills.sort((a,b)=>(robustScore(a[1])||0)-(robustScore(b[1])||0)).map(([sk,m])=>{
      const v=robustScore(m)||0; const [tg,tc]=trend(m); const isDue=due.includes(sk);

            ${isDue?'<span class="prog-due">review due</span>':''}</div>

          <div class="fld-hint">${m.attempts.length} attempt${m.attempts.length===1?'':'s'} · last ${new Date(m.attempts.slice(-1)[0].date).toLocaleDateString()}</div>

      <p class="muted" style="font-weight:700">Spaced practice locks learning in. Sprocket folds these into new sheets automatically — or make a focused review now:</p>

    <p class="ws-foot" style="margin-top:24px">Sprocket · generated ${new Date().toLocaleDateString()} · share this with a teacher or tutor</p>`;
  show("progress");
  say(`Here's how ${esc(k.name)} is growing. 🌱 Print this to share with a teacher or tutor.`,"","happy");
}
function reviewSkill(sk){
  const [sub,skill]=sk.split("::");
  S.sel.subject=sub; S.sel.customSkill=skill;
  S.sel.skill=(SKILLS[sub]&&SKILLS[sub][S.sel.grade]&&SKILLS[sub][S.sel.grade].includes(skill))?skill:"__custom__";
  save(); generate(true,'different');
}

// which pattern ids a given suggestion (by sigId) governs
function sugPatterns(sigId){
  if(sigId==='lr') return ['letter_reversal'];
  if(sigId==='nr') return ['number_reversal'];
  if(sigId==='fe') return ['stamina_dropoff','incomplete'];
  if(sigId==='tk') return ['reading_detail','reading_inference'];
  return [];
}
function findSug(id){
  for(const k of S.kids){ const s=(k.suggestions||[]).find(x=>x.id===id); if(s) return {k:ensureLearning(k),s}; }
  return null;
}
function acceptSug(id){
  const f=findSug(id); if(!f) return; const {k,s}=f;
  if(s.type==='accom' && s.payload.accom && !k.accoms.includes(s.payload.accom)) k.accoms.push(s.payload.accom);
  // only the patterns this suggestion governs become 'accepted' (these then drive future prompts)
  sugPatterns(s.sigId).forEach(pid=>{ if(k.patterns[pid]) k.patterns[pid].status='accepted'; });
  s.status='accepted'; save();
  const el=document.getElementById("sug-"+id);
  if(el) el.innerHTML='<div style="font-weight:800;color:var(--ok)">✓ Done — this now shapes future worksheets.</div>';
  if(s.type==='remediation') remediate(s.payload.subject,s.payload.skill);
}
function dismissSug(id){
  const f=findSug(id); if(!f) return; const {k,s}=f;
  s.status='dismissed';
  // park only this suggestion's patterns so it stops nagging, without killing other tracking
  sugPatterns(s.sigId).forEach(pid=>{ if(k.patterns[pid] && k.patterns[pid].status==='observed') k.patterns[pid].status='dismissed'; });
  save();
  const el=document.getElementById("sug-"+id);
  if(el) el.innerHTML='<div class="muted" style="font-weight:800">Okay, I won’t suggest that again.</div>';
}
function remediate(subject, skill){
  // No args → derive from the worksheet that was just graded (avoids embedding
  // skill text in inline onclick, which would HTML-entity-encode "&","/").
  if(!subject||!skill){
    const rec=S.history.find(x=>x.id===_gradeRecId);
    if(rec){ subject=rec.params.subject; skill=rec.params.skill; }
  }
  if(!subject||!skill){ toast("Couldn't find the skill to catch up on",true); return; }
  // Prerequisite-aware: if this skill has prerequisites and the learner is
  // genuinely low, the fix is usually the missing foundation, not "easier X".
  const k=ensureLearning(activeKid());
  const rs = k ? robustScore(k.mastery[skillKey(subject,skill)]) : null;
  const pq = prereqsFor(subject, skill);
  if(pq.length && (rs==null || rs<55)){
    const [psub,pskill]=pq[0].split("::");
    _prereqCatchup={ from:skill, to:pskill };
    S.sel.subject=psub; S.sel.customSkill=pskill;
    S.sel.skill = (SKILLS[psub]&&SKILLS[psub][S.sel.grade]&&SKILLS[psub][S.sel.grade].includes(pskill)) ? pskill : "__custom__";
    save();
    toast("Going back to the foundation: "+pskill+" 🧱");
    generate(true,'easier');
    return;
  }
  _prereqCatchup=null;
  S.sel.subject=subject; S.sel.customSkill=skill;
  S.sel.skill = currentSkillList().includes(skill) ? skill : "__custom__";
  save();
  generate(true,'easier');
}

/* ============================================================
   ORF — Oral Reading Fluency (timed repeated reading + WCPM)
   Evidence base: repeated reading is the most-proven fluency
   intervention; WCPM is the standard progress metric.
   ============================================================ */
let _orf=null; // { passageId, title, words[], misses:Set, lastIdx, attempt, timeLeft, timerH, running }

function startORF(reread){
  const k=ensureLearning(activeKid());
  if(!k){ toast("Pick a learner first",true); goProfiles(); return; }
  if(!S.apiKey){ toast("Add your OpenAI key first 🔑",true); openDrawer('settings'); return; }
  if(reread && _lastPassageId && k.passages[_lastPassageId]){
    const p=k.passages[_lastPassageId];
    beginORF(_lastPassageId, p.title, p.text, (p.attempts||1)+1);
    return;
  }
  document.getElementById("screen-loading").innerHTML=`
    <div class="loading"><h2 style="color:var(--grape-dk)">Writing a just-right passage… 📖</h2>
    <div class="loadbar"><i></i></div><div class="load-status">Leveled for ${esc(k.name)}…</div></div>`;
  show("loading");
  document.getElementById("robot").classList.add("think");
  genORFPassage(k);
}
let _lastPassageId=null;
async function genORFPassage(k){
  const grade=gradeLabel(k.grade);
  const accs=k.accoms.map(id=>ACCOMMODATIONS.find(a=>a.id===id)).filter(Boolean);
  const sys=[
"You write SHORT leveled reading passages for oral-reading-fluency practice (timed repeated reading) for K–5.",
"Rules: decodable + grade-appropriate vocabulary for the stated grade; natural connected prose (a tiny story or fun fact), NOT a word list; 40–120 words scaled to grade (K~40, G5~120); warm, engaging, child-safe; one clear topic.",
"Honor any learner accommodations (e.g., dyslexia → shorter sentences, decodable words; ADHD → high-interest, brisk).",
'Return ONLY JSON: { "title": string, "text": string, "wordCount": number }'
  ].join("\n");
  const usr=`Grade: ${grade}. Learner interests/notes: ${k.notes||"(none)"}. Accommodations: ${accs.map(a=>a.title).join(", ")||"none"}. Write the passage.`;
  try{
    const raw=await openaiChat([{role:"system",content:sys},{role:"user",content:usr}]);
    let p; try{ p=JSON.parse(raw); }catch(e){ p=JSON.parse(raw.replace(/^[^{]*/,"").replace(/[^}]*$/,"")); }
    const pid=uid();
    k.passages[pid]={ title:p.title||"Reading Passage", text:p.text||"", attempts:1 };
    _lastPassageId=pid; save();
    beginORF(pid, k.passages[pid].title, k.passages[pid].text, 1);
  }catch(e){
    document.getElementById("robot").classList.remove("think");
    document.getElementById("screen-loading").innerHTML=`<div class="loading">
      <h2 style="color:var(--err)">Couldn't write a passage 😟</h2><p style="font-weight:700">${esc(e.message||e)}</p>
      <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startORF()">Try again</button>
      <button class="btn ghost" onclick="renderWelcome()">Home</button></div></div>`;
  }
}
function beginORF(pid,title,text,attempt){
  document.getElementById("robot").classList.remove("think");
  const words=String(text).trim().split(/\s+/);
  _orf={ passageId:pid, title, words, misses:new Set(), lastIdx:words.length-1, attempt, timeLeft:60, timerH:null, running:false };
  renderORF();
}
function renderORF(){
  const o=_orf, big = (activeKid()&&activeKid().accoms.includes('dyslexia'));
  document.getElementById("screen-orf").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <h2 style="margin:0">${esc(o.title)} ${o.attempt>1?`<span class="pill">re-read #${o.attempt}</span>`:''}</h2>
      <div class="orf-timer ${o.running?'go':''}" id="orfTimer">${o.timeLeft}s</div>
    </div>
    <p class="lead">Child reads aloud. You tap any word they miss or skip. Tap the <b>last word they reached</b> when time's up.</p>
    <div class="orf-passage ${big?'big':''}" id="orfPassage">
      ${o.words.map((w,i)=>`<span class="orf-w" data-i="${i}" onclick="orfWord(${i})">${esc(w)}</span>`).join(" ")}
    </div>
    <div class="btn-row">
      ${!o.running && o.timeLeft===60 ? `<button class="btn sky" onclick="orfStart()">▶ Start (60s)</button>` : ''}
      ${o.running ? `<button class="btn coral" onclick="orfStop()">⏹ Done / Time's up</button>` : ''}
      ${!o.running && o.timeLeft<60 ? `<button class="btn mint" onclick="orfScore()">✓ Score it</button>
        <button class="btn ghost" onclick="beginORF(o_p(),o_t(),o_x(),_orf.attempt)">↻ Redo</button>` : ''}
      <button class="btn ghost" onclick="renderWelcome()">Cancel</button>
    </div>
    <p class="fld-hint" id="orfHint">Tip: a calm, no-pressure read gives the truest score. Repeated reads of the SAME passage build fluency fastest.</p>`;
  show("orf");
  say(o.attempt>1
      ? `Re-read #${o.attempt} of the same passage — this is exactly how fluency grows. Tap misses, I'll track the climb. 📈`
      : `Reading time! ${esc(activeKid()?activeKid().name:'')} reads aloud, you tap the tricky words. 🎤`,"","");
}
function o_p(){return _orf.passageId;} function o_t(){return _orf.title;}
function o_x(){return _orf.words.join(" ");}
function orfWord(i){
  if(!_orf) return;
  if(_orf._pickLast){
    // one tap after Stop = mark the last word the child actually reached
    _orf.lastIdx=i; _orf._pickLast=false;
    document.querySelectorAll('#orfPassage .orf-w').forEach(el=>{
      const idx=+el.dataset.i;
      el.classList.toggle('last', idx===i);
      el.style.opacity = idx>i ? .35 : 1;   // grey out words past the stopping point
    });
    const h=document.getElementById("orfHint");
    if(h) h.innerHTML='✓ Stopping point set. Adjust misses if needed, then <b>Score it</b>.';
    return;
  }
  if(_orf.misses.has(i)) _orf.misses.delete(i); else _orf.misses.add(i);
  const el=document.querySelector('#orfPassage .orf-w[data-i="'+i+'"]');
  if(el) el.classList.toggle('miss',_orf.misses.has(i));
}
function orfStart(){
  _orf.running=true; _orf.timeLeft=60; renderORFTimer();
  _orf.timerH=setInterval(()=>{ _orf.timeLeft--; renderORFTimer();
    if(_orf.timeLeft<=0) orfStop(); },1000);
  renderORF();
}
function renderORFTimer(){ const t=document.getElementById("orfTimer"); if(t){ t.textContent=_orf.timeLeft+"s"; t.classList.toggle('go',_orf.running); } }
function orfStop(){
  if(_orf.timerH) clearInterval(_orf.timerH);
  _orf.running=false;
  document.getElementById("orfHint").innerHTML='⛳ Now tap the <b>last word</b> the child reached, then "Score it". (Skip if they finished the whole passage.)';
  // re-render to show Score button; keep misses
  const html=document.getElementById("screen-orf");
  renderORF();
  // attach a one-time "set last word" behavior: next tap on a non-miss word marks lastIdx
  _orf._pickLast=true;
}
function orfScore(){
  const o=_orf, k=ensureLearning(activeKid());
  const reached=o.lastIdx+1;                 // words attempted
  const errors=[...o.misses].filter(i=>i<=o.lastIdx).length;
  const correct=Math.max(0, reached-errors);
  const wcpm=correct;                        // 60-second read → WCPM == correct words
  const rec={ date:Date.now(), title:o.title, passageId:o.passageId, attempt:o.attempt,
              words:reached, errors, wcpm };
  k.fluency.push(rec);
  if(k.passages[o.passageId]) k.passages[o.passageId].attempts=o.attempt;
  save();
  const prev=k.fluency.filter(f=>f.passageId===o.passageId && f.attempt<o.attempt).slice(-1)[0];
  const delta=prev? wcpm-prev.wcpm : null;
  const band=wcpmBand(k.grade,wcpm);
  document.getElementById("screen-orf").innerHTML=`
    <h2>${esc(k.name)} — ${wcpm} WCPM 🎤</h2>
    <div class="center" style="margin:12px 0">
      <div class="ring" style="--p:${Math.min(100,Math.round(wcpm/ (wcpmTarget(k.grade)||60) *100))}">
        <div class="inner"><span class="scorebig">${wcpm}</span></div></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
        <span class="mini-stat">${rec.words}<small>words read</small></span>
        <span class="mini-stat">${errors}<small>misses</small></span>
        <span class="mini-stat">${o.attempt}<small>read #</small></span>
        ${delta!=null?`<span class="mini-stat" style="color:${delta>=0?'var(--mint)':'var(--coral)'}">${delta>=0?'+':''}${delta}<small>vs last read</small></span>`:''}
      </div>
    </div>
    <p style="background:var(--bg-2);border-radius:14px;padding:14px;font-weight:700">${band}</p>
    <div class="btn-row">
      ${o.attempt<3?`<button class="btn sky" onclick="startORF(true)">🔁 Re-read this passage (read #${o.attempt+1})</button>`:''}
      <button class="btn mint" onclick="startORF()">📖 New passage</button>
      <button class="btn ghost" onclick="renderProgressReport('${k.id}')">📈 Progress</button>
      <button class="btn ghost" onclick="renderWelcome()">🏠 Home</button>
    </div>
    <p class="fld-hint">Repeated reading works: aim for 3 reads of the same passage across a few days and watch WCPM climb. Sprocket logs every read.</p>`;
  show("orf");
  burstConfetti();
  say(delta!=null && delta>0
      ? `Up ${delta} words from last time — that's fluency growing in real time! 🎉`
      : `Logged: ${wcpm} words per minute. Re-reading the same passage is the proven way to grow this. 💪`,"","happy");
}
// rough ORF norms (Hasbrouck-Tindal-ish, spring, 50th %ile) — guidance only
function wcpmTarget(g){ return {K:20,"1":60,"2":100,"3":120,"4":135,"5":150}[g]||100; }
function wcpmBand(g,w){
  const t=wcpmTarget(g);
  if(w>=t) return `🌟 At or above a typical spring ${gradeLabel(g)} pace (~${t} WCPM). Keep the variety coming.`;
  if(w>=t*0.75) return `👍 Approaching the typical ${gradeLabel(g)} range (~${t} WCPM). Repeated reading will close the gap.`;
  return `🌱 Below the typical ${gradeLabel(g)} range (~${t} WCPM) — exactly what this practice is for. Re-read the same passage 2–3×; expect a jump. If it stays well below, shorter/easier passages and a phonics check help.`;
}

  try{
    const up=await SB.loadUserPrefs();
    if(up){ S.apiKey=up.apiKey||S.apiKey; S.textModel=up.textModel||S.textModel;
            S.imageModel=up.imageModel||S.imageModel;
            if(up.theme){ S.theme=up.theme; applyTheme(); }
            if(typeof up.generateImage==="boolean") S.generateImage=up.generateImage;
            if(typeof up.bwMode==="boolean") S.bwMode=up.bwMode; }
  }catch(e){ console.warn("prefs load:",e); }

  let blob=null;
  try{ blob=await SB.loadFamilyState(); }catch(e){ console.warn("family state load:",e); }

  if(blob){
    S.kids=blob.kids||[]; S.history=blob.history||[]; S.sel=blob.sel||S.sel; S.activeKidId=blob.activeKidId||null;
    renderWelcome();
  } else {
    // No cloud data yet. Offer to migrate existing localStorage data.
    const local=(()=>{ try{ return JSON.parse(localStorage.getItem(LS)||"null"); }catch(_){ return null; } })();
    if(local && (local.kids||[]).length){
      document.getElementById("screen-welcome").innerHTML=`
        <h2>Bring your data over? 📦</h2>
        <p class="lead">Found ${local.kids.length} learner profile(s) and ${ (local.history||[]).length } worksheet(s) saved on this device. Import them into <b>${esc(SB.family.name)}</b>?</p>
        <div class="btn-row">
          <button class="btn" onclick="doMigrate()">Yes, import everything ✓</button>
          <button class="btn ghost" onclick="startFresh()">Start fresh instead</button>
        </div>`;
      show("welcome");
      say("I found your existing kids and progress on this device. Want me to bring them into your family? 📦","","happy");
    } else {
      renderWelcome();
    }
  }
}
async function doMigrate(){
  try{
    const local=JSON.parse(localStorage.getItem(LS)||"{}");
    S.kids=local.kids||[]; S.history=local.history||[]; S.sel=local.sel||S.sel; S.activeKidId=local.activeKidId||null;
    await SB.saveFamilyState({ kids:S.kids, history:S.history, sel:S.sel, activeKidId:S.activeKidId });
    toast("Imported into "+SB.family.name+" ✓");
    renderWelcome();
  }catch(e){ toast("Import failed: "+e.message,true); }
}
function startFresh(){ S.kids=[]; S.history=[]; S.activeKidId=null; save(); renderWelcome(); }

/* Auth state listener (set before SB.ready resolves) */
window.__sprocketAuthChanged = async function(){
  if(!SB.configured) return;
  if(!SB.user){
    // signed out — if it was a denial, keep the denied screen visible
    if(_denied) return;
    renderAuth(); return;
  }
  // INVITE-ONLY gate: verify the email is on the allowlist before anything else
  const ok = await SB.isAllowed();
  if(!ok){
    const email = SB.user.email;
    renderDenied(email);          // show first so the message persists
    try{ await SB.signOutNow(); }catch(e){}  // re-fires authChanged(null); _denied guard holds the screen
    return;
  }
  try{
    const fam=await SB.resolveFamily();
    if(!fam){ renderFamily(); return; }
    await enterApp();
  }catch(e){ console.warn("auth-change resolve:",e); renderFamily(); }
};

/* ============================================================
   LOGGING (best-effort → Firestore logs collection, admin-readable)
   ============================================================ */
let _logT=0;
function logEvent(type, msg, meta){
  try{
    if(!(window.SB && SB.configured && SB.user)) return;       // only when cloud-authed
    const now=Date.now();
    if(type!=="error" && now-_logT<800) return;                // throttle non-errors
    _logT=now;
    SB.writeLog({ type, msg:String(msg||"").slice(0,500), meta: meta? String(JSON.stringify(meta)).slice(0,800):null });
  }catch(e){}
}
window.addEventListener("error", e=>{
  logEvent("error", (e && e.message)||"window error",
    { src:(e&&e.filename)||"", line:(e&&e.lineno)||0, stack:(e&&e.error&&e.error.stack||"").slice(0,600) });
});
window.addEventListener("unhandledrejection", e=>{
  logEvent("error", "unhandled promise: "+((e&&e.reason&&(e.reason.message||e.reason))||""), null);
});

/* ============================================================
   ADMIN SCREEN  (only reachable if SB.isAdmin())
   ============================================================ */
let _adminTab="people", _adminCache={};
async function renderAdmin(){
  if(!_isAdmin){ toast("Admins only",true); renderWelcome(); return; }
  document.getElementById("screen-admin").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">🛠️ Admin</h2>
      <button class="btn ghost sm" onclick="renderWelcome()">← Back to app</button>
    </div>
    <div class="cap-tabs" style="margin:14px 0">
      ${["people","families","activity","errors","usage"].map(t=>
        `<button class="cap-tab ${_adminTab===t?'on':''}" onclick="adminTab('${t}')">${
          {people:"👥 People",families:"👪 Families",activity:"📊 Activity",errors:"⚠️ Errors",usage:"📈 Usage"}[t]}</button>`).join("")}
    </div>
    <div id="adminBody"><div class="loading"><div class="loadbar"><i></i></div><div class="load-status">Loading…</div></div></div>`;
  show("admin");
  say("Admin console. You're the boss here. 🛠️","","");
  adminRenderBody();
}
function adminTab(t){ _adminTab=t; renderAdmin(); }
async function adminRenderBody(){
  const b=()=>document.getElementById("adminBody"); if(!b()) return;
  try{
    if(_adminTab==="people"){
      const list=await SB.listAllowlist();
      b().innerHTML=`
        <div style="background:var(--bg-2);border-radius:14px;padding:14px;margin-bottom:14px">
          <div style="font-weight:800;margin-bottom:8px">➕ Invite someone (Gmail)</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input class="in" id="adm-email" placeholder="name@gmail.com" style="flex:2;min-width:180px">
            <input class="in" id="adm-name" placeholder="Display name" style="flex:1;min-width:120px">
            <button class="btn sm" onclick="adminAdd()">Add</button>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:.9rem">
          <tr style="text-align:left;color:var(--ink-soft)"><th style="padding:6px">Email</th><th>Name</th><th>Admin</th><th></th></tr>
          ${list.map(u=>`<tr style="border-top:1px solid var(--line)">
            <td style="padding:8px 6px;font-weight:700">${esc(u.email)}</td>
            <td>${esc(u.name||"—")}</td>
            <td><button class="btn ghost sm" data-em="${esc(u.email)}" data-mk="${u.admin?'0':'1'}" onclick="adminToggleAdmin(this.dataset.em,this.dataset.mk==='1')">${u.admin?"✅ admin":"— make admin"}</button></td>
            <td>${u.email===(SB.user&&SB.user.email)?'<span class="muted">(you)</span>':`<button class="btn coral sm" data-em="${esc(u.email)}" onclick="adminKick(this.dataset.em)">Kick</button>`}</td>
          </tr>`).join("")}
        </table>`;
    } else if(_adminTab==="families"){
      const fams=await SB.allFamilies(); _adminCache.fams=fams;
      let html="";
      for(const f of fams){
        const ms=await SB.familyMembers(f.id);
        const blob=await SB.familyStateBlob(f.id);
        const kids=(blob&&blob.kids||[]).length, ws=(blob&&blob.history||[]).length;
        html+=`<div class="card" style="margin:0 0 10px;padding:14px">
          <div style="font-weight:800">${esc(f.name||"(unnamed)")} <span class="muted" style="font-size:.78rem">· code ${esc(f.code||"?")} · ${kids} learner(s) · ${ws} worksheet(s)</span></div>
          <div class="fld-hint" style="margin-top:4px">${ms.map(m=>esc(m.name||m.uid)+" ("+esc(m.role)+")").join(" · ")||"no members"}</div>
        </div>`;
      }
      b().innerHTML=html||'<p class="muted">No families yet.</p>';
    } else if(_adminTab==="activity"||_adminTab==="errors"){
      const logs=await SB.recentLogs(150);
      const want = _adminTab==="errors" ? logs.filter(l=>l.type==="error") : logs.filter(l=>l.type!=="error");
      b().innerHTML = want.length? `<div style="font-family:var(--mono,monospace);font-size:.82rem">${
        want.map(l=>{ const d=l.at&&l.at.toDate?l.at.toDate().toLocaleString():"";
          return `<div style="border-top:1px solid var(--line);padding:8px 4px">
            <span class="muted">${esc(d)}</span> · <b>${esc(l.type)}</b> · ${esc(l.email||"")}<br>
            ${esc(l.msg||"")}${l.meta?`<div class="muted" style="font-size:.74rem;white-space:pre-wrap">${esc(l.meta)}</div>`:""}</div>`;
        }).join("")}</div>` : '<p class="muted">Nothing logged yet.</p>';
    } else if(_adminTab==="usage"){
      const [list,fams,logs]=await Promise.all([SB.listAllowlist(),SB.allFamilies(),SB.recentLogs(300)]);
      let kids=0,ws=0;
      for(const f of fams){ const blob=await SB.familyStateBlob(f.id); kids+=(blob&&blob.kids||[]).length; ws+=(blob&&blob.history||[]).length; }
      const gens=logs.filter(l=>l.type==="generate").length, errs=logs.filter(l=>l.type==="error").length;
      b().innerHTML=`
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          <span class="mini-stat">${list.length}<small>invited</small></span>
          <span class="mini-stat">${fams.length}<small>families</small></span>
          <span class="mini-stat">${kids}<small>learners</small></span>
          <span class="mini-stat">${ws}<small>worksheets</small></span>
          <span class="mini-stat">${gens}<small>generations*</small></span>
          <span class="mini-stat">${errs}<small>errors*</small></span>
        </div>
        <p class="fld-hint">* from the last 300 log entries.</p>
        <div style="background:var(--bg-2);border-radius:14px;padding:14px;margin-top:10px">
          <div style="font-weight:800;margin-bottom:6px">Real numbers (BYOK + free Spark = no in-app metering)</div>
          <p class="fld-hint" style="margin:0 0 10px">Firestore byte usage and OpenAI $ aren't available client-side. Each person's AI spend is on <b>their own</b> OpenAI key. Use these dashboards for actuals:</p>
          <div class="btn-row" style="margin:0">
            <a class="btn ghost sm" href="https://console.firebase.google.com/project/sprocket-app-8a67b/firestore/usage" target="_blank" rel="noopener">Firestore usage →</a>
            <a class="btn ghost sm" href="https://console.firebase.google.com/project/sprocket-app-8a67b/usage" target="_blank" rel="noopener">Project usage →</a>
            <a class="btn ghost sm" href="https://platform.openai.com/usage" target="_blank" rel="noopener">OpenAI usage →</a>
          </div>
        </div>`;
    }
  }catch(e){ b().innerHTML=`<p style="color:var(--err);font-weight:700">Couldn't load: ${esc(e.message||e)}</p>`; }
}
async function adminAdd(){
  const e=document.getElementById("adm-email").value, n=document.getElementById("adm-name").value;
  try{ await SB.addToAllowlist(e,n); toast("Added "+e+" ✓"); adminRenderBody(); }
  catch(err){ toast(err.message||"Add failed",true); }
}
async function adminKick(email){
  try{ await SB.removeFromAllowlist(email); toast(email+" removed"); adminRenderBody(); }
  catch(err){ toast(err.message||"Remove failed",true); }
}
async function adminToggleAdmin(email,val){
  try{ await SB.setAdminFlag(email,val); toast("Updated "+email); adminRenderBody(); }
  catch(err){ toast(err.message||"Update failed",true); }
}

/* ============================================================
   BOOT
   ============================================================ */
(async function boot(){
  applyTheme();
  startRobotLife();
  await SB.ready;
  if(!SB.configured){
    // LOCAL MODE — no Firebase config yet. Behaves exactly like the
    // old single-file app: localStorage only, no login. Lets Parker
    // keep using it offline until the cloud config is pasted in.
    renderWelcome();
    return;
  }
  // CLOUD MODE — onAuthStateChanged already fired (or will) and
  // __sprocketAuthChanged routes to auth → family → app.
  if(SB.user){ window.__sprocketAuthChanged(); }
  else renderAuth();
})();
</script>
