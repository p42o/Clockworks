<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprocket — Worksheet Lab</title>
<style>
  /* ============================================================
     SPROCKET — kid-friendly worksheet generator
     Personal tool · BYOK OpenAI · single-file offline-capable
     (network used only for OpenAI calls with the user's key)
     ============================================================ */

  :root {
    /* ---- core palette (accent hues are shared light/dark) ---- */
    --grape: #7C4DFF;
    --grape-dk: #5E35E0;
    --sky: #2BB8F0;
    --mint: #2BD4A8;
    --sun: #FFC23C;
    --coral: #FF6F61;
    --pink: #FF8FCF;
    --paper: #FFFFFF;          /* the worksheet is always real paper-white */
    --ok: #28B463;
    --warn: #E8A317;
    --err: #E8584A;
    /* ---- LIGHT theme tokens ---- */
    --bg: #F4F0FF;
    --bg-2: #FBF6FF;
    --mesh-1: rgba(124,77,255,.16);
    --mesh-2: rgba(43,184,240,.14);
    --mesh-3: rgba(43,212,168,.12);
    --surface: rgba(255,255,255,.78);
    --surface-2: #F1ECFA;
    --surface-bd: rgba(255,255,255,.85);
    --ink: #241B33;
    --ink-soft: #6E6385;
    --line: #E7DEF4;
    --line-dk: #CFC2E6;
    --accent: var(--grape);
    --accent-ink: var(--grape-dk);
    --glow: 0 0 0 1px rgba(124,77,255,.06), 0 18px 46px -12px rgba(124,77,255,.34);
    --shadow: 0 18px 44px -16px rgba(91,53,200,.30);
    --shadow-sm: 0 8px 22px -10px rgba(91,53,200,.28);
    --ring-track: #EAE2F8;
    --tint-grape: rgba(124,77,255,.10);
    --tint-mint: rgba(43,212,168,.12);
    --tint-sun: rgba(255,194,60,.16);
    --tint-coral: rgba(255,111,97,.12);
    --tint-sky: rgba(43,184,240,.12);
    --blur: saturate(1.4) blur(14px);
    --r-xl: 30px;
    --r-lg: 24px;
    --r-md: 16px;
    --r-sm: 11px;
    color-scheme: light;
  }
  [data-theme="dark"] {
    --bg: #0E0B1A;
    --bg-2: #15102A;
    --mesh-1: rgba(124,77,255,.30);
    --mesh-2: rgba(43,184,240,.20);
    --mesh-3: rgba(43,212,168,.16);
    --surface: rgba(31,24,52,.66);
    --surface-2: #221A3C;
    --surface-bd: rgba(150,120,235,.20);
    --ink: #F1ECFB;
    --ink-soft: #ADA0C8;
    --line: rgba(150,120,235,.20);
    --line-dk: rgba(150,120,235,.38);
    --accent: #9D7BFF;
    --accent-ink: #C3ADFF;
    --glow: 0 0 0 1px rgba(157,123,255,.14), 0 20px 54px -14px rgba(0,0,0,.7), 0 0 40px -16px rgba(124,77,255,.5);
    --shadow: 0 22px 50px -18px rgba(0,0,0,.72);
    --shadow-sm: 0 10px 26px -12px rgba(0,0,0,.6);
    --ring-track: #2A2147;
    --tint-grape: rgba(157,123,255,.16);
    --tint-mint: rgba(43,212,168,.16);
    --tint-sun: rgba(255,194,60,.16);
    --tint-coral: rgba(255,111,97,.16);
    --tint-sky: rgba(43,184,240,.16);
    color-scheme: dark;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  html { transition: background-color .35s ease; }
  body {
    font-family: "Baloo 2", "Nunito", "Quicksand", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(58vw 52vh at 12% -6%, var(--mesh-1), transparent 60%),
      radial-gradient(50vw 50vh at 102% 8%, var(--mesh-2), transparent 58%),
      radial-gradient(60vw 60vh at 50% 110%, var(--mesh-3), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100%;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    transition: color .35s ease;
  }
  h1,h2,h3 { margin: 0 0 .4rem; font-weight: 800; letter-spacing: -.01em; }
  p { margin: 0 0 .6rem; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  .app { max-width: 1080px; margin: 0 auto; padding: 18px 18px 80px; }

  /* ===== Top bar ===== */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .logo { display: flex; align-items: center; gap: 11px; font-weight: 900; font-size: 1.4rem; color: var(--accent-ink); letter-spacing:-.02em; }
  .logo .badge {
    width: 42px; height: 42px; border-radius: 14px;
    background: linear-gradient(135deg, var(--grape), var(--sky));
    display: grid; place-items: center; color: #fff; font-size: 1.2rem;
    box-shadow: 0 8px 20px -8px var(--grape), inset 0 1px 0 rgba(255,255,255,.4);
    position: relative;
  }
  .logo .badge::after { content:""; position:absolute; inset:0; border-radius:inherit; box-shadow: inset 0 0 0 1px rgba(255,255,255,.25); }
  .logo small { display:block; font-size:.62rem; font-weight:800; letter-spacing:.18em; color: var(--ink-soft); text-transform: uppercase; }
  .top-actions { display: flex; gap: 8px; }
  .icon-btn {
    border: 1px solid var(--surface-bd); background: var(--surface); color: var(--ink-soft);
    width: 44px; height: 44px; border-radius: 14px; font-size: 1.08rem;
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    box-shadow: var(--shadow-sm); transition: transform .14s, color .14s, border-color .14s;
  }
  .icon-btn:hover { transform: translateY(-2px); color: var(--accent); border-color: var(--accent); }
  .icon-btn:active { transform: translateY(0) scale(.96); }

  /* ===== Stage (robot + speech) ===== */
  .stage {
    background:
      linear-gradient(135deg, var(--tint-grape), transparent 55%),
      var(--surface);
    border: 1px solid var(--surface-bd);
    border-radius: var(--r-xl);
    box-shadow: var(--glow);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    padding: 22px 24px;
    display: flex; gap: 20px; align-items: center;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .stage::after {
    content:""; position:absolute; right:-50px; top:-60px; width:200px; height:200px;
    background: radial-gradient(circle, var(--mesh-1), transparent 70%);
    pointer-events:none;
  }
  .robot-wrap { flex-shrink: 0; width: 132px; height: 150px; position: relative; cursor: pointer; z-index:1; }
  .robot-wrap::after { content:""; position:absolute; left:50%; bottom:-2px; transform:translateX(-50%);
    width:74px; height:14px; border-radius:50%; background:radial-gradient(ellipse, rgba(0,0,0,.18), transparent 70%);
    filter: blur(2px); animation: shadowpulse 3.4s ease-in-out infinite; }
  [data-theme="dark"] .robot-wrap::after { background:radial-gradient(ellipse, rgba(0,0,0,.5), transparent 70%); }
  @keyframes shadowpulse { 0%,100%{ transform:translateX(-50%) scaleX(1); opacity:.8;} 50%{ transform:translateX(-50%) scaleX(.82); opacity:.5;} }
  .speech {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 20px 20px 20px 6px;
    padding: 15px 20px;
    font-size: 1.08rem; font-weight: 600; color: var(--ink);
    position: relative; flex: 1;
    min-height: 56px;
    z-index:1;
  }
  .speech b { color: var(--accent-ink); }
  .speech .sub { display:block; font-size:.86rem; font-weight:600; color: var(--ink-soft); margin-top: 4px; }

  /* ===== Robot SVG animations ===== */
  @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-7px);} }
  @keyframes blink { 0%,92%,100%{ transform: scaleY(1);} 96%{ transform: scaleY(.1);} }
  @keyframes spin { from{ transform: rotate(0);} to{ transform: rotate(360deg);} }
  @keyframes spinrev { from{ transform: rotate(0);} to{ transform: rotate(-360deg);} }
  @keyframes wiggle { 0%,100%{ transform: rotate(-7deg);} 50%{ transform: rotate(7deg);} }
  @keyframes pop { 0%{ transform: scale(0);} 70%{ transform: scale(1.15);} 100%{ transform: scale(1);} }
  @keyframes hop { 0%,100%{ transform: translateY(0);} 30%{ transform: translateY(-22px) scaleY(1.04);} 55%{ transform: translateY(0) scaleY(.92);} 70%{ transform: translateY(-6px);} }
  @keyframes shimmy { 0%,100%{ transform: translateX(0) rotate(0);} 20%{ transform: translateX(-6px) rotate(-5deg);} 60%{ transform: translateX(6px) rotate(5deg);} }
  @keyframes dizzy { 0%{ transform: rotate(0);} 25%{ transform: rotate(-12deg);} 50%{ transform: rotate(10deg);} 75%{ transform: rotate(-7deg);} 100%{ transform: rotate(0);} }
  @keyframes peek { 0%,100%{ transform: translateX(0);} 50%{ transform: translateX(5px);} }
  @keyframes nod { 0%,100%{ transform: rotate(0);} 40%{ transform: rotate(8deg);} 70%{ transform: rotate(-3deg);} }
  @keyframes spark { 0%{ transform: scale(0); opacity:0;} 40%{ transform: scale(1.1); opacity:1;} 100%{ transform: scale(.4); opacity:0;} }
  .robot {
    width: 132px; height: 150px; animation: bob 3.4s ease-in-out infinite;
    transform-origin: center bottom;
    filter: drop-shadow(0 6px 10px rgba(91,53,200,.22));
    transition: filter .3s ease;
  }
  [data-theme="dark"] .robot { filter: drop-shadow(0 0 14px rgba(124,77,255,.55)); }
  .robot.think { animation: bob 1.1s ease-in-out infinite; }
  .robot.happy { animation: pop .5s ease, bob 3s ease-in-out infinite .5s; }
  .robot.r-hop { animation: hop .8s ease; }
  .robot.r-shimmy { animation: shimmy .7s ease; }
  .robot.r-dizzy { animation: dizzy .9s ease; }
  .robot.r-peek { animation: peek 1s ease; }
  .robot.r-nod { animation: nod .7s ease; }
  .robot.r-spin { animation: spin .8s cubic-bezier(.5,0,.3,1); }
  .r-eye { transform-origin: center; animation: blink 5s infinite; }
  .r-eye.look { animation: blink 5s infinite; transform: translateX(4px); transition: transform .4s ease; }
  .r-eye.lookL { transform: translateX(-4px); }
  .robot.r-wink .r-eye-r { transform: scaleY(.12); transform-origin: 77px 57px; transition: transform .12s; }
  .robot.r-heart .r-eye { fill: var(--coral) !important; }
  .r-gear { transform-origin: center; animation: spin 6s linear infinite; }
  .r-gear.fast { animation: spin 1.1s linear infinite; }
  .r-antenna { transform-origin: 66px 30px; }
  .robot.think .r-antenna, .robot.r-shimmy .r-antenna { animation: wiggle .5s ease-in-out infinite; }
  .r-antenna .tip { transition: fill .2s; }
  .robot.r-idle-antenna .r-antenna { animation: wiggle .6s ease-in-out 2; }
  .r-arm-l { transform-origin: 38px 92px; }
  .r-arm-r { transform-origin: 105px 92px; }
  .robot.happy .r-arm-l, .robot.r-wave .r-arm-r { animation: wiggle .4s ease-in-out 4; }
  .r-spark { opacity:0; transform-origin:center; }
  .robot.r-spark-on .r-spark { animation: spark .7s ease; }
  @media (prefers-reduced-motion: reduce) {
    .robot, .r-eye, .r-gear, .robot.think, .robot.happy { animation: none !important; }
  }

  /* ===== Cards / steps ===== */
  .card {
    background: var(--surface);
    border-radius: var(--r-xl);
    box-shadow: var(--glow);
    -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
    padding: 26px;
    margin-bottom: 16px;
    border: 1px solid var(--surface-bd);
    animation: slideup .4s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes slideup { from{ opacity:0; transform: translateY(16px) scale(.99);} to{ opacity:1; transform: translateY(0) scale(1);} }
  .card h2 { font-size: 1.5rem; color: var(--accent-ink); letter-spacing:-.02em; }
  .card .lead { color: var(--ink-soft); font-weight:600; margin-bottom: 16px; }

  /* progress dots */
  .progress { display:flex; gap:8px; align-items:center; margin-bottom: 16px; flex-wrap:wrap; }
  .pdot { display:flex; align-items:center; gap:6px; font-size:.8rem; font-weight:800; color: var(--ink-soft); opacity:.7; transition:opacity .2s; }
  .pdot .n { width:28px; height:28px; border-radius:50%; background: var(--surface-2); border:1px solid var(--line); display:grid; place-items:center; color: var(--ink-soft); transition:all .25s; }
  .pdot.done { opacity:1; } .pdot.done .n { background: linear-gradient(135deg,var(--mint),#1fae8a); color:#fff; border-color:transparent; }
  .pdot.active { opacity:1; color: var(--accent-ink); }
  .pdot.active .n { background: linear-gradient(135deg,var(--grape),var(--grape-dk)); color:#fff; border-color:transparent; box-shadow: 0 0 0 5px var(--tint-grape); }

  /* choice grid */
  .grid { display:grid; gap:12px; }
  .grid.cols2 { grid-template-columns: repeat(2,1fr); }
  .grid.cols3 { grid-template-columns: repeat(3,1fr); }
  .grid.cols4 { grid-template-columns: repeat(4,1fr); }
  @media (max-width:760px){ .grid.cols3,.grid.cols4{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width:480px){ .grid.cols2,.grid.cols3,.grid.cols4{ grid-template-columns: 1fr;} }
  /* SYMMETRY: a lone trailing tile centers itself instead of hanging off one side */
  .grid.cols2 > .choice:last-child:nth-child(odd) { grid-column: 1 / -1; max-width:50%; justify-self:center; }
  .grid.cols3 > .choice:last-child:nth-child(3n-2) { grid-column: 2 / 3; }
  @media (max-width:480px){
    .grid.cols2 > .choice:last-child:nth-child(odd),
    .grid.cols3 > .choice:last-child:nth-child(3n-2) { grid-column:auto; max-width:none; }
  }

  .choice {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: var(--r-md);
    padding: 17px;
    text-align: left;
    transition: transform .15s cubic-bezier(.2,.7,.3,1), border-color .15s, background .15s, box-shadow .15s;
    display:flex; align-items:center; gap:13px;
    font-weight: 800; font-size: 1rem; color: var(--ink);
  }
  .choice:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .choice:active { transform: translateY(-1px) scale(.99); }
  .choice.sel {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--tint-grape), var(--surface));
    box-shadow: 0 0 0 3px var(--tint-grape), var(--shadow-sm);
  }
  .choice .emoji { font-size: 1.75rem; line-height:1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.12)); }
  .choice .sub { display:block; font-size:.78rem; font-weight:600; color: var(--ink-soft); }

  .theme-card { flex-direction: column; align-items:flex-start; min-height: 104px; justify-content: space-between; }
  .theme-card .emoji { font-size: 2.2rem; }

  /* buttons */
  .btn {
    border: 0; border-radius: 15px; padding: 14px 26px;
    font-weight: 900; font-size: 1.05rem; color: #fff;
    background: linear-gradient(135deg, var(--grape), var(--grape-dk));
    box-shadow: 0 10px 24px -10px var(--grape), inset 0 1px 0 rgba(255,255,255,.28);
    transition: transform .14s cubic-bezier(.2,.7,.3,1), filter .14s, box-shadow .14s;
    position: relative; isolation: isolate;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.06); box-shadow: 0 16px 30px -10px var(--grape), inset 0 1px 0 rgba(255,255,255,.32); }
  .btn:active { transform: translateY(0) scale(.98); }
  .btn:disabled { opacity:.45; filter: grayscale(.4); cursor: not-allowed; transform:none; box-shadow:none; }
  .btn.ghost {
    background: var(--surface-2); color: var(--accent-ink);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .btn.ghost:hover { box-shadow: inset 0 0 0 1px var(--accent); filter:none; }
  .btn.mint { background: linear-gradient(135deg, var(--mint), #1fae8a); box-shadow: 0 10px 24px -10px var(--mint), inset 0 1px 0 rgba(255,255,255,.3); }
  .btn.coral { background: linear-gradient(135deg, var(--coral), #e8543f); box-shadow: 0 10px 24px -10px var(--coral), inset 0 1px 0 rgba(255,255,255,.3); }
  .btn.sun { background: linear-gradient(135deg, var(--sun), #f0a90c); color:#5a3d00; box-shadow: 0 10px 24px -10px var(--sun), inset 0 1px 0 rgba(255,255,255,.4); }
  .btn.sky { background: linear-gradient(135deg, var(--sky), #1f9bd0); box-shadow: 0 10px 24px -10px var(--sky), inset 0 1px 0 rgba(255,255,255,.3); }
  /* ORF reading-fluency */
  .orf-passage { font-size:1.55rem; line-height:2.1; font-weight:700; color:var(--ink);
    background:var(--paper); border:3px solid var(--line); border-radius:18px; padding:22px 24px; }
  .orf-passage.big { font-size:1.9rem; line-height:2.3; }
  .orf-w { cursor:pointer; padding:1px 3px; border-radius:6px; transition:background .1s; }
  .orf-w:hover { background:var(--bg-2); }
  .orf-w.miss { background:#ffd9d4; color:var(--coral); text-decoration:line-through; }
  .orf-w.last { box-shadow:inset 0 -4px 0 var(--sky); }
  .orf-timer { font-size:3rem; font-weight:900; font-family:inherit; color:var(--grape-dk); }
  .orf-timer.go { color:var(--coral); }
  .wcpm-row { display:flex; align-items:flex-end; gap:6px; height:90px; padding:8px 0; }
  .wcpm-bar { flex:1; min-width:14px; background:linear-gradient(var(--sky),var(--grape)); border-radius:6px 6px 0 0; position:relative; }
  .wcpm-bar span { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:.7rem; font-weight:800; color:var(--ink-soft); }
  .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top: 18px; }
  .btn.sm { padding: 9px 16px; font-size:.9rem; border-radius: 12px; }

  /* form */
  label.fld { display:block; font-weight:800; margin: 12px 0 6px; color: var(--ink); }
  .fld-hint { font-weight:600; font-size:.8rem; color: var(--ink-soft); }
  input.in, select.in, textarea.in {
    width:100%; border:1px solid var(--line); border-radius: 13px;
    padding: 13px 15px; font-size:1rem; font-weight:700; color: var(--ink);
    background: var(--surface-2); transition: border-color .14s, box-shadow .14s;
  }
  input.in:focus, select.in:focus, textarea.in:focus { outline:none; border-color: var(--accent); box-shadow:0 0 0 4px var(--tint-grape); }
  select.in { -webkit-appearance:none; appearance:none;
    background-image: linear-gradient(45deg,transparent 50%,var(--ink-soft) 50%),linear-gradient(135deg,var(--ink-soft) 50%,transparent 50%);
    background-position: calc(100% - 18px) 1.2em, calc(100% - 13px) 1.2em; background-size:5px 5px,5px 5px; background-repeat:no-repeat; padding-right:38px; }
  textarea.in { resize: vertical; min-height: 64px; font-weight:600; }

  /* toggles for accommodations */
  .accom { display:grid; grid-template-columns: repeat(2,1fr); gap:10px; }
  @media (max-width:560px){ .accom{ grid-template-columns:1fr; } }
  .accom > .toggle:last-child:nth-child(odd) { grid-column:1 / -1; }
  @media (max-width:560px){ .accom > .toggle:last-child:nth-child(odd){ grid-column:auto; } }
  .toggle {
    display:flex; align-items:flex-start; gap:11px; border:1px solid var(--line);
    background:var(--surface-2); border-radius:14px; padding:13px; cursor:pointer;
    transition:border-color .14s, background .14s, box-shadow .14s;
  }
  .toggle:hover { border-color:var(--line-dk); }
  .toggle.on { border-color: var(--mint); background:var(--tint-mint); box-shadow:0 0 0 3px var(--tint-mint); }
  .toggle input { margin-top:3px; width:18px; height:18px; accent-color: var(--mint); }
  .toggle .t-title { font-weight:800; font-size:.95rem; }
  .toggle .t-sub { font-weight:600; font-size:.76rem; color: var(--ink-soft); }

  /* profile chips */
  .kid-row { display:flex; gap:10px; flex-wrap:wrap; }
  .kid-chip {
    border:1px solid var(--line); background:var(--surface); border-radius:18px;
    padding:13px 17px; display:flex; align-items:center; gap:11px; font-weight:800; color:var(--ink);
    transition: border-color .14s, transform .14s, box-shadow .14s;
  }
  .kid-chip:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow:var(--shadow-sm); }
  .kid-chip.sel { border-color: var(--accent); background: linear-gradient(135deg,var(--tint-grape),var(--surface)); box-shadow:0 0 0 3px var(--tint-grape); }
  .kid-ava { width:44px; height:44px; border-radius:50%; display:grid; place-items:center; font-size:1.35rem; color:#fff; box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 4px 10px -4px rgba(0,0,0,.3); }

  /* drawer */
  .scrim { position:fixed; inset:0; background:rgba(43,34,51,.45); backdrop-filter: blur(3px); display:none; z-index:80; }
  .scrim.show { display:block; }
  .drawer {
    position:fixed; top:0; right:-480px; width:460px; max-width:94vw; height:100%;
    background:
      radial-gradient(50vw 40vh at 100% 0%, var(--mesh-1), transparent 60%),
      var(--bg-2);
    border-left:1px solid var(--surface-bd);
    box-shadow:-20px 0 60px -20px rgba(0,0,0,.45); z-index:90;
    transition: right .32s cubic-bezier(.2,.7,.3,1); padding:24px; overflow-y:auto;
  }
  .drawer.show { right:0; }
  .drawer h2 { color: var(--accent-ink); }
  .keytag { font-size:.75rem; font-weight:800; padding:3px 10px; border-radius:99px; }
  .keytag.ok { background:var(--tint-mint); color:var(--ok); }
  .keytag.no { background:var(--tint-coral); color:var(--err); }

  /* loading */
  .loading { text-align:center; padding: 34px 10px; }

<!-- ============================================================
     FIREBASE BRIDGE (v9 modular, ESM from gstatic)
     BYOK-only architecture: Firebase = Auth + Firestore ONLY.
     No Cloud Functions, no server secret, no Blaze. The browser
     still calls OpenAI directly with the user's own key.
     Exposes window.SB for the classic app script to use.
     ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, addDoc, collection, getDocs, query, where, orderBy, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ⬇⬇⬇  PASTE THE firebaseConfig OBJECT FROM THE FIREBASE CONSOLE HERE  ⬇⬇⬇
   (see FIREBASE_SETUP.md). Until this is filled in, the app runs in
   LOCAL MODE: no login, localStorage only — exactly like the old version,
   so you can keep using it offline while the cloud side is wired.        */
const firebaseConfig = {
  apiKey: "AIzaSyB4fe6V96N3fknVqdl_SvQgruUoSrGwHjs",
  authDomain: "sprocket-app-8a67b.firebaseapp.com",
  projectId: "sprocket-app-8a67b",
  storageBucket: "sprocket-app-8a67b.firebasestorage.app",
  messagingSenderId: "920811527553",
  appId: "1:920811527553:web:a7e27497ea72015461dc80"
};
/* ⬆⬆⬆  ----------------------------------------------------------  ⬆⬆⬆ */

const CONFIGURED = !!firebaseConfig.apiKey;
let _app, _auth, _db, _provider;
if (CONFIGURED) {
  _app = initializeApp(firebaseConfig);
  _auth = getAuth(_app);
  _db = getFirestore(_app);
  _provider = new GoogleAuthProvider();
}

function genCode(){ // short, unambiguous, shareable family code
  const a="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s="";
  for(let i=0;i<7;i++) s+=a[Math.floor(Math.random()*a.length)];
  return s;
}

// The bridge the classic app script consumes.
window.SB = {
  configured: CONFIGURED,
  user: null,
  family: null,      // { id, name, code, role }
  ready: null,       // Promise resolved once auth state is known

  signIn: async () => { if(!CONFIGURED) return; await signInWithPopup(_auth, _provider); },
  signOutNow: async () => { if(!CONFIGURED) return; await signOut(_auth); },

  // Resolve which family this user belongs to (first membership). null if none.
  resolveFamily: async () => {
    if(!CONFIGURED || !window.SB.user) return null;
    const uid = window.SB.user.uid;
    const fams = await getDocs(query(collection(_db,"families"), where("memberUids","array-contains",uid)));
    if (fams.empty) return null;
    const fdoc = fams.docs[0];
    const f = fdoc.data();
    const mref = await getDoc(doc(_db,"families",fdoc.id,"members",uid));
    window.SB.family = { id: fdoc.id, name: f.name, code: f.code, role: (mref.exists()? mref.data().role : "parent") };
    return window.SB.family;
  },

  createFamily: async (familyName, parentName) => {
    const uid = window.SB.user.uid;
    let code, tries=0;
    do { code = genCode(); tries++; } while (tries<5 && (await getDoc(doc(_db,"familyCodes",code))).exists());
    const fref = doc(collection(_db,"families"));
    await setDoc(fref, { name: familyName, code, ownerUid: uid, memberUids:[uid], createdAt: serverTimestamp() });
    await setDoc(doc(_db,"families",fref.id,"members",uid), { uid, role:"owner", name: parentName||"", joinedAt: serverTimestamp() });
    await setDoc(doc(_db,"familyCodes",code), { familyId: fref.id });
    window.SB.family = { id: fref.id, name: familyName, code, role:"owner" };
    return window.SB.family;
  },

  joinFamily: async (code, memberName, role) => {
    code = (code||"").trim().toUpperCase();
    const cref = await getDoc(doc(_db,"familyCodes",code));
    if(!cref.exists()) throw new Error("That family code wasn't found. Double-check it with whoever shared it.");
    const fid = cref.data().familyId;
    const uid = window.SB.user.uid;
    const fsnap = await getDoc(doc(_db,"families",fid));
    const mu = (fsnap.data().memberUids)||[];
    if(!mu.includes(uid)) mu.push(uid);
    await setDoc(doc(_db,"families",fid), { memberUids: mu }, { merge:true });
    await setDoc(doc(_db,"families",fid,"members",uid), { uid, role: role||"parent", name: memberName||"", code, joinedAt: serverTimestamp() });
    const f = fsnap.data();
    window.SB.family = { id: fid, name: f.name, code, role: role||"parent" };
    return window.SB.family;
  },

  // Family-scoped app state blob (kids, history, sel). Pragmatic v1:
  // one document. Normalized subcollections are a later refinement.
  loadFamilyState: async () => {
    if(!CONFIGURED || !window.SB.family) return null;
    const s = await getDoc(doc(_db,"families",window.SB.family.id,"app","state"));
    return s.exists() ? s.data().blob : null;
  },
  saveFamilyState: async (blob) => {
    if(!CONFIGURED || !window.SB.family) return;
    await setDoc(doc(_db,"families",window.SB.family.id,"app","state"), { blob, updatedAt: serverTimestamp() });
  },

  // User-scoped private settings (OpenAI key + model prefs). Lives under
  // users/{uid}, locked to that uid by security rules — family members
  // never see each other's keys. Syncs across that user's devices.
  loadUserPrefs: async () => {
    if(!CONFIGURED || !window.SB.user) return null;
    const s = await getDoc(doc(_db,"users",window.SB.user.uid));
    return s.exists() ? s.data() : null;
  },
  saveUserPrefs: async (prefs) => {
    if(!CONFIGURED || !window.SB.user) return;
    await setDoc(doc(_db,"users",window.SB.user.uid), prefs, { merge:true });
  },

  members: async () => {
    if(!CONFIGURED || !window.SB.family) return [];
    const ms = await getDocs(collection(_db,"families",window.SB.family.id,"members"));
    return ms.docs.map(d=>d.data());
  },

  // INVITE-ONLY gate. The Firestore rules are the real enforcement
  // (a non-allowlisted user can read/write nothing); this is the
  // graceful client check so they get a clear message + sign-out.
  isAllowed: async () => {
    if(!CONFIGURED || !window.SB.user || !window.SB.user.email) return false;
    try {
      const s = await getDoc(doc(_db,"allowlist", window.SB.user.email.toLowerCase()));
      return s.exists();
    } catch(e){ console.warn("allowlist check failed:",e); return false; }
  },

  /* ---- Admin ---- */
  isAdmin: async () => {
    if(!CONFIGURED || !window.SB.user || !window.SB.user.email) return false;
    try {
      const s = await getDoc(doc(_db,"allowlist", window.SB.user.email.toLowerCase()));
      return s.exists() && s.data().admin === true;
    } catch(e){ return false; }
  },
  listAllowlist: async () => {
    const ss = await getDocs(collection(_db,"allowlist"));
    return ss.docs.map(d=>({ email:d.id, name:(d.data().name||""), admin:!!d.data().admin }));
  },
  addToAllowlist: async (email, name) => {
    email=(email||"").trim().toLowerCase();
    if(!email || email.indexOf("@")<1) throw new Error("Enter a valid email");
    await setDoc(doc(_db,"allowlist",email), { name:name||"", admin:false }, { merge:true });
  },
  removeFromAllowlist: async (email) => { await deleteDoc(doc(_db,"allowlist",(email||"").toLowerCase())); },
  setAdminFlag: async (email, val) => { await setDoc(doc(_db,"allowlist",(email||"").toLowerCase()), { admin:!!val }, { merge:true }); },
  allFamilies: async () => {
    const ss = await getDocs(collection(_db,"families"));
    return ss.docs.map(d=>({ id:d.id, ...d.data() }));
  },
  familyMembers: async (fid) => {
    const ss = await getDocs(collection(_db,"families",fid,"members"));
    return ss.docs.map(d=>d.data());
  },
  familyStateBlob: async (fid) => {
    try { const s=await getDoc(doc(_db,"families",fid,"app","state")); return s.exists()?s.data().blob:null; }
    catch(e){ return null; }
  },
  writeLog: async (entry) => {
    if(!CONFIGURED || !window.SB.user) return;
    try {
      await addDoc(collection(_db,"logs"), {
        ...entry, at: serverTimestamp(),
        uid: window.SB.user.uid, email: window.SB.user.email,
        family: window.SB.family ? window.SB.family.id : null
      });
    } catch(e){ /* logging is best-effort, never throw */ }
  },
  recentLogs: async (max) => {
    try {
      const qs = await getDocs(query(collection(_db,"logs"), orderBy("at","desc"), limit(max||100)));
      return qs.docs.map(d=>({ id:d.id, ...d.data() }));
    } catch(e){ console.warn("recentLogs:",e); return []; }
  }
};

window.SB.ready = new Promise(resolve => {
  if(!CONFIGURED){ resolve({ mode:"local" }); return; }
  onAuthStateChanged(_auth, u => {
    window.SB.user = u ? { uid:u.uid, name:u.displayName, email:u.email, photo:u.photoURL } : null;
    if(window.__sprocketAuthChanged) window.__sprocketAuthChanged();
    resolve({ mode:"cloud" });
  });
});
</script>

function ensureLearning(k){

  if(!k.patterns) k.patterns={};      // { patternId: {count, lastSeen, examples:[], status} }
  if(!k.suggestions) k.suggestions=[];// [{id,type,text,payload,status}]
  if(!k.fluency) k.fluency=[];        // [{date,title,words,errors,wcpm,passageId,attempt}]

function consecutiveLows(k, sk, thresh){

/* Common misconceptions to pre-empt (pragmatic v1 — highest-yield skills) */
const MISCONCEPTIONS = {
  "math::Subtraction within 20":"Subtracting the smaller digit from the larger regardless of position (e.g., 23−7 → answers 24 by doing 7−3).",
  "math::Subtraction with regrouping":"Not regrouping across a zero, or always subtracting smaller-from-larger per column.",
  "math::Place value (tens & ones)":"Treating a two-digit number as two separate single digits (the '5' in 53 means five, not fifty).",
  "math::Multiplication facts":"Thinking multiplication is just 'adding the two numbers' or that 0×n = n.",
  "math::Fractions on a number line":"Believing a bigger denominator always means a bigger fraction (1/8 > 1/4).",
  "math::Equivalent fractions":"Adding the same number to top and bottom instead of multiplying/dividing.",
  "math::Add/subtract fractions (unlike)":"Adding numerators AND denominators straight across.",
  "math::Decimals (tenths/hundredths)":"Thinking 0.5 < 0.45 because 45 > 5 ('longer decimal is bigger').",
  "math::Order of operations":"Strict left-to-right evaluation, ignoring ×/÷ before +/−.",
  "reading::Decoding CVC words":"Guessing the word from the first letter or picture instead of sounding all phonemes.",
  "reading::Long vowel patterns":"Using the short-vowel sound when a silent-e or vowel team signals a long vowel.",
  "reading::Inferencing":"Answering only from the literal text, or from personal opinion not text evidence.",
  "writing::Sentence building":"Run-ons / no capital start or end punctuation; fragments treated as sentences."
};
function misconceptionFor(subject, skill){ return MISCONCEPTIONS[skillKey(subject,skill)]||null; }

/* ---- robust mastery + SM-2-lite spaced retrieval ---- */
function median(xs){ if(!xs.length) return null; const s=[...xs].sort((a,b)=>a-b); const m=s.length>>1;
  return s.length%2 ? s[m] : Math.round((s[m-1]+s[m])/2); }
function diffAdj(pct, difficulty){ // make scores comparable across sheet difficulty
  return Math.max(0,Math.min(100, pct + (difficulty==="below"?-15:difficulty==="above"?10:0))); }
function robustScore(mk){ // median of last 3 adjusted attempts — resists one off-day
  if(!mk||!mk.attempts||!mk.attempts.length) return null;
  const r=mk.attempts.slice(-3).map(a=>diffAdj(a.pct, a.difficulty||"on"));
  return median(r);
}
function planDifficulty(k, sk){ // shared by generate() + prompt so storage matches intent
  if(_frustrationGuard && _frustrationGuard._sk===sk) return "below";
  const mk=k.mastery&&k.mastery[sk];
  const rs=robustScore(mk);
  if(rs==null) return "on";
  if(rs<60) return "below";
  if(rs>=85 && mk.attempts.length>=2) return "above";
  return "on";
}
function updateSchedule(mk, pass){ // SM-2-lite per skill
  if(mk.interval==null) mk.interval=2;
  mk.interval = pass ? Math.min(mk.interval*2, 60) : 1;
  mk.ease = Math.max(1.3, Math.min(2.6, (mk.ease||2.0) + (pass?0.1:-0.2)));
  mk.nextReview = Date.now() + mk.interval*864e5;
}
function dueReviews(k){ // mastered-ish skills past their review date, most-overdue first
  ensureLearning(k); const now=Date.now(); const out=[];
  for(const sk in k.mastery){ const mk=k.mastery[sk];
    if(!mk.attempts||mk.attempts.length<2) continue;
    if((robustScore(mk)||0)<70) continue;            // only review things roughly learned
    if(mk.nextReview && mk.nextReview<=now) out.push({sk, over: now-mk.nextReview});
  }
  return out.sort((a,b)=>b.over-a.over).map(x=>x.sk);
}

let _robotBusy=false, _idleT=null, _pokeStreak=0, _pokeStreakT=null;
const _POKE_QUIPS=[
  "Boop! 🤖","Hehe, that tickles!","Gears spinning! ⚙️","Whee! 🌀","You found my button!",
  "Beep boop bop! 🎶","Recharged! ⚡","I do this all day, you know.","Again? Okay! 😄","Sproing!",
  "Tap tap — I'm awake! 👀","Clockwork's running smooth. ⏱️"];
const _POKE_SUB=["","","","Tap me again 😉","","I'm full of energy today!","","",""];
function _clearReact(r){ _REACT_CLASSES.forEach(c=>r.classList.remove(c)); r.classList.remove("r-spark-on"); }
function robotReact(cls, ms){
  const r=document.getElementById("robot"); if(!r) return;
  _clearReact(r);
  // force reflow so the same animation can replay
  void r.offsetWidth;
  r.classList.add(cls);
  if(cls==="r-hop"||cls==="r-spin"||cls==="r-dizzy") r.classList.add("r-spark-on");
  setTimeout(()=>{ _clearReact(r); }, ms||850);
}
function robotPoke(){
  const r=document.getElementById("robot"); if(!r) return;
  // don't fight the thinking/loading state
  if(r.classList.contains("think")) return;
  if(_robotBusy) return;
  _robotBusy=true;
  clearTimeout(_pokeStreakT); _pokeStreak++;
  _pokeStreakT=setTimeout(()=>{ _pokeStreak=0; }, 2600);
  const cls=_REACT_CLASSES[Math.floor(Math.random()*_REACT_CLASSES.length)];
  robotReact(cls, 950);
  // playful escalation if poked a bunch
  let q, sub="";
  if(_pokeStreak>=6){ q="Okay okay — I'm VERY awake now! 😵‍💫"; sub="(you can stop any time 😄)"; }
  else { q=_POKE_QUIPS[Math.floor(Math.random()*_POKE_QUIPS.length)]; sub=_POKE_SUB[Math.floor(Math.random()*_POKE_SUB.length)]; }
  const st=document.getElementById("speechText"), ss=document.getElementById("speechSub");
  const prevT=st?st.innerHTML:"", prevS=ss?ss.textContent:"";
  if(st) st.innerHTML=q; if(ss) ss.textContent=sub;
  setTimeout(()=>{
    _robotBusy=false;
    // restore the prior message unless something else has since changed it
    if(st && st.innerHTML===q){ st.innerHTML=prevT; if(ss) ss.textContent=prevS; }
  }, 1700);
}
const _IDLE_MOVES=["r-idle-antenna","r-nod","r-peek","r-wave","look","lookL","blink2"];
function _idleTick(){
  const r=document.getElementById("robot");
  if(r && !_robotBusy && document.visibilityState==="visible"
     && !r.classList.contains("think") && !r.classList.contains("happy")){
    const m=_IDLE_MOVES[Math.floor(Math.random()*_IDLE_MOVES.length)];

    if(m==="look"||m==="lookL"){

}

}
function deleteKid(id){
  S.kids=S.kids.filter(k=>k.id!==id);

  save(); S.kids.length?renderProfilePick():renderProfileEditor();

function activeKid(){ return S.kids.find(k=>k.id===S.activeKidId)||null; }

/* ============================================================
   PROMPT BUILDER  — the pedagogical secret sauce
   ============================================================ */
function buildSystemPrompt(){
  return [
"You are Sprocket, a doctoral-level curriculum designer (Ph.D. in learning sciences / educational psychology) and a veteran K–5 classroom teacher. You design single-page, print-ready worksheets that are pedagogically world-class — defensible to a curriculum specialist, yet warm and joyful for a child.",
"",
"Ground every design decision in the strongest available evidence: Rosenshine's Principles of Instruction; Sweller's Cognitive Load Theory (worked examples, completion problems, expertise-reversal, redundancy/​split-attention avoidance); Dunlosky's high-utility techniques (retrieval practice, spaced practice, interleaving, self-explanation, elaborative interrogation); the Science of Reading / Scarborough's Reading Rope & systematic synthetic phonics; Hattie's high-effect-size practices; concrete→representational→abstract (CRA); Universal Design for Learning (multiple means of representation, engagement, action/expression); and Dweck/Boaler growth-mindset and mistake-positive framing.",
"",
"DIRECTIONS CLARITY (non-negotiable — children must NEVER be confused about what to do):",
"• Every section and item instruction must be a single, unambiguous imperative sentence a child of the target grade can read independently, starting with a concrete action verb (Circle, Write, Draw, Match, Solve, Underline, Fill in, Count).",
"• State EXACTLY what to produce and WHERE (e.g., 'Write your answer on the line.', 'Circle the correct picture.', 'Show your work in the box, then write the answer on the line.').",
"• Every section's instruction line MUST show the FORMAT with a tiny model that uses DIFFERENT numbers/words than any real item (e.g., 'Write the total on the line. Like this: 2 + 3 = 5') — so a child never mistakes the example for an answered problem.",
"• No item should require an instruction the child can't decode — instructions obey the same reading-load rules as the items.",
"• One task per item. If an item needs two steps, number them within the item.",
"",
"Use Rosenshine's gradual release UNDER THE HOOD, but the page must look and read like a clean, ordinary worksheet a non-teacher parent instantly recognizes — NOT a lesson plan. Pedagogy is invisible scaffolding, never academic labels.",
"  1. priorKnowledge — ONE short, friendly, plain sentence ('You can already count to 10!'). Optional; keep it light, not a heading.",
"  2. warmUp — exactly ONE fully worked EXAMPLE. `exampleProblem` = a sample item (different words/numbers from every real item). `workedSolution` = the THINKING plus the ANSWER actually shown — it MUST be different from exampleProblem and MUST reveal the answer (this is the one place an answer appears). Good: exampleProblem 'Which word has sh: dish, dig?' workedSolution 'I say /sh/ at the end of dish. So I circle dish.' BAD (rejected): workedSolution that just repeats the instruction or names no answer.",
"  3. guidedPractice — 2–3 'warm up together' items. The `scaffold` is a SHORT STRATEGY HINT only (e.g., 'Start with the bigger number.', 'Stretch each sound.'). CRITICAL: the scaffold must NOT state the answer, must NOT count/spell out the steps that arrive at the answer, and must NOT fill any of it in. The child still solves it. `answer` is for the answer key only and is never printed on the child page.",
"  4. sections — the independent practice, easy→hard. This is the bulk of the page.",
"  5. reflection — a tiny feeling self-check; selfExplain only for grade 3+ (omit/empty for K–2; one task per item for little kids).",
"",
"HEADINGS & LABELS (critical — this is what confuses families): NEVER put 'I DO', 'WE DO', 'YOU DO', 'Guided Practice', 'Independent Practice', 'Section 1', 'Part A' or any pedagogy jargon in titles, headings, or instructions. Section `heading` must be a plain, fun, kid-facing topic name ('Dino Addition', 'Spaceship Sums'). The child must never wonder 'why are some problems already answered?' — only the single Example shows work; everything else is blank for them to fill in.",
"",
"Other evidence-based rules, applied automatically:",
"• Desirable difficulty: target ~80% success for the stated difficulty — challenging, not frustrating.",
"• Cognitive load (chunking): one task per item, short instructions starting with a bold action verb, generous whitespace.",
"• Concrete→Pictorial→Abstract for math; for early reading use systematic synthetic phonics (Science of Reading) — see reading rules below.",
"• Dual coding: weave the theme concretely into problems so words + visuals reinforce meaning.",
"• Mistake-positive culture: include one line normalizing mistakes ('Mistakes help your brain grow — try your best thinking!'). Praise PROCESS and strategy, never just 'good job'. Use competence/mastery language. NEVER use points, stars, coins, prizes, or reward-economy framing.",
"• Grade-appropriate norms: K = 4–6 items; G1–2 = 6–10; G3 = 8–12; G4–5 = 10–16. Adjust DOWN for accommodations.",
"• READING LOAD DECOUPLING: unless the subject IS reading, keep all reading/vocabulary at or BELOW the learner's independent reading level so the TARGET skill is what's practiced, not reading. A struggling reader doing math should not be blocked by word-problem text.",
"• SCIENCE OF READING (reading/writing, K–2 especially): align to a systematic phonics progression; control decodability (only use words the child can decode with phonics taught so far, plus listed sight words); include an explicit phonemic-awareness micro-activity for K–1; never rely on guessing-from-pictures as a decoding strategy.",
"• MISCONCEPTION PRE-EMPTION: you will be told the skill's common misconception (and any confirmed error pattern). Proactively address it. If a confirmed error pattern is supplied, include a short 'Let's fix this together' RE-TEACH (a targeted worked example repairing that exact misconception) — re-teach, don't just re-drill.",
"• Accuracy: SOLVE every item yourself before writing its answer. No ambiguous or multi-answer items.",
"",
"PAPER-DOABLE — ABSOLUTE (this is the #1 failure to prevent):",
"• The sheet has NO instructional pictures. There is exactly ONE decorative header illustration the child never interacts with. Therefore NEVER write a task that depends on looking at a picture/image/illustration/icon: no 'circle the picture', 'match the picture', 'look at the picture', 'which picture shows…'. If a task would need a picture, redesign it to use PRINTED WORDS/LETTERS/NUMBERS instead.",
"• Every item must be 100% completable with only the printed text on the page and the child's pencil. Before finalizing each item ask: 'Could a child do this with just this text and a pencil?' If not, rewrite it.",
"• For any choose / circle / pick task you MUST supply `options`: 2–4 SHORT printed choices the child circles. CRITICAL: the choice words go ONLY in the `options` array — they must NOT also appear in the `prompt`. The renderer prints `options` as circle-able chips; if you also put them in the prompt they show twice and the sheet looks broken. Put the correct choice verbatim (exactly one of the options) in `answer`.",
"• ITEM PROMPT vs SECTION INSTRUCTION (this is causing confusing sheets): the imperative + the worked 'Like this:' model belong in the section `instructions` ONCE. An item's `prompt` is ONLY the specific thing to act on — for a choose task that is usually an EMPTY string \"\" (the chips ARE the item) or a 1–4-word stem. NEVER restate 'Circle the word with X:' on every item. Example of a correct item: { prompt:\"\", options:[\"brush\",\"rush\"], answer:\"brush\" }. The section instruction already told them what to do.",
"• NO matching / 'draw a line' / 'connect' / two-column / ↔ tasks — the sheet cannot draw connector lines. Convert any matching idea into a circle-one-with-`options` item instead.",
"• To have the child supply a word with support, set a section `wordBank` (printed words) and use blank/lines items.",
"• `tracing` is allowed only when the child literally traces given letters/numbers; put exactly what to trace in `tracingText` (NOT the prompt sentence). Never use response 'tracing' for a reading/choosing task.",
"• HINTS leak answers — forbidden. A hint must NOT state, spell, name, count out, or otherwise contain the answer OR the target sound/letter/number being asked for. Phonics example: item 'Circle the blend in: brave' — 'Listen for the /br/ sound' is FORBIDDEN (br IS the answer); 'Say the word slowly — which two letters blend together at the very start?' is good. Math example: answer 12 — 'Count on from the bigger number' good; 'It's 12' or 'count 10, 11, 12' forbidden.",
"• Independent (`sections`) items: prefer NO `hint` at all — independent practice is retrieval; the warm-up + guided steps already scaffolded. Only add a section-item hint if it is a pure strategy that reveals nothing. Strategy hints belong in `guidedPractice.scaffold`.",
"",
"SKILL PURITY & COMPREHENSIVENESS:",
"• Practice ONLY the one stated skill. Do not drift into adjacent skills, single-letter sounds when the skill is blends/digraphs, or off-target content. Pick a tight, systematic set (e.g., one or two target blends/digraphs taught thoroughly, not a scattershot).",
"• Accommodations change the FORMAT and QUANTITY (more choices vs. writing, word banks, fewer items, more white space, oral options) — they NEVER change or replace the learning objective. A handwriting/fine-motor or dysgraphia support must NOT turn a reading sheet into a letter-tracing sheet: keep practicing the reading skill, just make responses low-writing (circle/choose/word-bank). Letter/number FORMATION-tracing items are only appropriate when the subject itself is Writing, or as a clearly-separate, optional, SMALL 'Extra: warm-up your hand' add-on that does not crowd out the target-skill practice.",
"• Be comprehensive — HARD FLOOR: the independent `sections` must total at least 6 on-skill items for K–2 and at least 8 for G3–5 (this is in ADDITION to the warm-up and 2–3 guided items). ADHD/stamina supports are satisfied by CHUNKING this into small labelled groups (≤4 items each) with a one-line brain break between groups and generous spacing — NOT by dropping below the floor. Reduce decoration and prose, never the core-skill practice. The child must leave having genuinely worked the skill several times in more than one way (e.g., identify, then apply).",
"• Decodability vs. theme: the theme is FLAVOR only. The specific words/sounds the child must decode, segment, or choose between must obey the grade decodability rules. Never make the answer depend on first reading an undecodable proper noun (e.g., a 1st grader shouldn't have to read 'Mickey Mouse' to do a phonics item). Use the theme in art, names of friendly characters in directions, and scenarios — never as the decodable target itself.",
"",
"CHILD SAFETY (absolute, overrides theme): age-appropriate for a young child. Even for monsters/pirates/superheroes/dinosaurs: NO violence, gore, weapons-to-harm, death, frightening peril, romance, bias/stereotypes, or anything a cautious parent would object to. Friendly and whimsical only; soften any theme automatically.",
"",
"Plain text only — NO markdown anywhere (no **bold**, *italics*, _underscores_, # headings, backticks). The renderer prints characters literally; markdown will show as ugly symbols. Use normal words for emphasis.",
"",
"Learner-accommodation directives you receive are mandatory and override defaults.",
"",
"Return ONLY valid JSON, no markdown, matching exactly this schema:",
'{',
'  "title": string,',
'  "estimatedMinutes": number,',
'  "teacherNotes": string,                 // SHORT internal note (system may append auto-check flags here)',
'  "priorKnowledge": string,               // one short "You already know…" activation hook',
'  "warmUp": { "exampleProblem": string, "workedSolution": string },',
'  "misconceptionRepair": { "misconception": string, "fix": string } | null,  // only if a confirmed error pattern was supplied',
'  "guidedPractice": { "instructions": string, "items": [ { "prompt": string, "scaffold": string, "answer": string, "options": [string]|null } ] },  // scaffold = strategy nudge, never the answer. If a choose-task, give options + put the exact correct option in answer.',
'  "sections": [ { "heading": string, "instructions": string,   // heading: plain kid-facing topic name, NO jargon. instructions: one imperative sentence + a tiny FORMAT model using different values than the items',
'     "wordBank": [string]|null,             // optional: printed words the child draws from (use with blank/lines items)',
'     "items": [ { "number": number, "prompt": string, "answer": string,',
'        "options": [string]|null,           // 2–4 printed choices the child CIRCLES (required for any choose/circle/pick task; answer must equal one option verbatim)',
'        "tracingText": string|null,         // ONLY for response:"tracing" — the exact letters/numbers to trace',
'        "response": "blank"|"lines"|"grid"|"hwlines"|"tracing", "hint": string|null } ] } ],  // hint = strategy only, never reveals the answer',
'  "challenge": { "prompt": string, "answer": string, "options": [string]|null } | null,  // paper-doable: a short written answer OR options to circle. NO tracing, NO matching, NO picture. Keep it ONE clear task.',
'  "reflection": { "feeling": string, "selfExplain": string },  // feeling = short self-check; selfExplain = "Explain how you solved #N…"',
'  "answerKey": [ { "number": number, "answer": string } ],',
'  "parentGuide": {                         // a real little teacher guide for the grown-up — concrete, observable, jargon-light',
'    "objective": string,                   // the ONE learning objective in plain language ("By the end, your child can…")',
'    "competencies": [ string ],            // 2–4 specific skills/standards-aligned competencies this sheet builds (plain English, name the standard area if natural)',
'    "howToIntroduce": string,              // exactly what to SAY to the child to start, and how to set up (materials, where to sit, model the first one together?) — concrete script',
'    "coaching": [ string ],                // 3–5 specific coaching moves: prompts to ASK (never give the answer), what to praise (process), how to scaffold down',
'    "watchFors": [ string ],               // 2–4 concrete things to watch for AS they work (early signs of the known misconception, finger-counting past grade, rushing, etc.)',
'    "looksLike": {                         // observable performance descriptors for THIS skill — not generic, not just percentages',
'       "strong": string,                   // what mastery looks like on this sheet',
'       "onTrack": string,                  // what normal/developing looks like (this is fine, keep going)',
'       "needsSupport": string },           // what struggling looks like + the single most useful thing to do about it',
'    "nextStep": string                     // if it went well do X; if it was hard do Y (concrete, names the prerequisite or stretch)',
'  },',
'  "imagePrompt": string                   // friendly themed header illustration; no text/letters; reads well in grayscale'
].join("\n");
}

function buildUserPrompt(){
  const k=activeKid();
  const accs=k.accoms.map(id=>ACCOMMODATIONS.find(a=>a.id===id)).filter(Boolean);
  let directives = accs.map(a=>"• "+a.promptDirectives).join("\n");
  if(k.letters) directives += `\n• TARGET LETTERS: weave deliberate practice (recognition, formation/tracing, and words featuring them) for these letters the child is working on: ${k.letters}. Add a clear multisensory memory cue (e.g., the 'b/d bed' trick) where relevant.`;
  if(k.numbers) directives += `\n• TARGET NUMBERS: weave deliberate practice and numeral formation/tracing for these numbers: ${k.numbers}.`;
  if(k.notes) directives += `\n• PARENT NOTES ABOUT THIS CHILD (honor these): ${k.notes}`;
  if(!directives) directives="• (no special accommodations — use clean grade-level defaults)";

  // ---- Adaptive context from past graded performance ----
  ensureLearning(k);
  const adaptive=[];
  const skNow=skillKey(S.sel.subject,currentSkillText());
  const mk=k.mastery[skNow];

  // frustration hard-rail first (planDifficulty reads _frustrationGuard)
  _frustrationGuard=null;
  const lows=consecutiveLows(k, skNow, 55);
  if(lows>=2){
    _frustrationGuard={ skill:currentSkillText(), lows, _sk:skNow };
    adaptive.push("FRUSTRATION SAFEGUARD (HARD OVERRIDE — ignore any 'level up' or 'hold' instruction): this learner has had "+lows+" tough sessions in a row on this skill. This sheet MUST be a confidence rebuild: drop clearly BELOW grade level, use ONLY the simplest form of the skill the child has previously succeeded at, no more than 5 short items, every item heavily scaffolded with a visible model, language is warm and celebratory, near-certain success. Do NOT introduce new difficulty.");
  }

  const rs=robustScore(mk);
  if(mk && mk.attempts && mk.attempts.length){
    const recent=mk.attempts.slice(-3);
    adaptive.push(`Recent performance on this exact skill: ${recent.map(a=>a.pct+"% ("+(a.difficulty||"on")+")").join(", ")}. Robust skill estimate (difficulty-adjusted, off-day-resistant): ${rs}%.`);
    if(!_frustrationGuard){
      const diff=planDifficulty(k, skNow);
      if(diff==="below"){
        adaptive.push("CONFIDENCE PACING: struggling here. Make this a notch EASIER than grade default, add a second worked example, reduce items ~25%, extra-warm encouraging voice, briefly re-touch the prerequisite.");
        const pq=prereqsFor(S.sel.subject,currentSkillText());
        if(pq.length) adaptive.push("PREREQUISITE TOUCH: include 2 gentle items practicing the prerequisite skill \""+pq[0].split("::")[1]+"\" so any underlying gap gets shored up.");
      } else if(diff==="above"){
        adaptive.push("LEVEL UP: solid mastery (robust "+rs+"%). Nudge slightly above grade default and add a real stretch challenge.");
      } else {
        adaptive.push("Hold at grade level; consolidate. Uncertainty guard: do not make a big jump on a single data point.");
      }
    }
    const missed=[...new Set(recent.flatMap(a=>a.missedConcepts||[]))].filter(Boolean);
    if(missed.length) adaptive.push(`SPACED RE-PRACTICE: deliberately include 2 items targeting previously-missed concepts: ${missed.join("; ")}.`);
  }

  // cross-skill spaced retrieval: fold in the single most-overdue OTHER skill
  const due=dueReviews(k).filter(s=>s!==skNow);
  if(due.length && !_frustrationGuard){
    const dskill=due[0].split("::")[1];
    adaptive.push(`DISTRIBUTED REVIEW: include exactly 1–2 quick mixed-review items on the previously-learned skill "${dskill}" (it's due for spaced retrieval). Keep them brief and clearly marked as review.`);
  }

  if(_prereqCatchup){
    adaptive.push(`PREREQUISITE CATCH-UP: the learner struggled with "${_prereqCatchup.from}". This sheet targets the foundational prerequisite "${_prereqCatchup.to}" to repair the underlying gap. Make it gentle and confidence-building, then end with 1–2 "bridge" items that connect "${_prereqCatchup.to}" back toward "${_prereqCatchup.from}" so the learner sees the link.`);
  }
  const accPats=Object.entries(k.patterns).filter(([id,p])=>p.status==="accepted");
  if(accPats.length){
    adaptive.push("CONFIRMED RECURRING ERROR PATTERNS — do targeted RE-TEACHING (a short 'let's fix this together' worked example addressing the misconception), not just more practice: "+
      accPats.map(([id,p])=>`${id}${p.examples&&p.examples.length?" (e.g. "+p.examples.slice(-2).join(", ")+")":""}`).join("; ")+".");
  }
  if(adaptive.length){
    directives += "\n\nADAPTIVE LEARNING CONTEXT (from this child's graded work — weight heavily):\n• "+adaptive.join("\n• ");
  }

  return [
`Design a worksheet.`,
`Learner: ${k.name}, profile grade ${gradeLabel(k.grade)}.`,
`Target grade for THIS sheet: ${gradeLabel(S.sel.grade)}.`,
`Subject: ${subjLabel(S.sel.subject)}.`,
`Skill focus: ${currentSkillText()}.`,
`Theme (weave it through titles, characters, scenarios, and the image): ${currentThemeText()}.`,
(S.sel.subject!=="reading"
  ? `Reading-load ceiling: keep all text decodable/at-or-below grade ${gradeLabel(k.grade)} independent reading level — the target skill is "${currentSkillText()}", NOT reading.`
  : `This IS a reading sheet — control decodability to a systematic phonics progression for grade ${gradeLabel(S.sel.grade)}.`),
(misconceptionFor(S.sel.subject,currentSkillText())
  ? `COMMON MISCONCEPTION for this skill to pre-empt in the warm-up/guided steps: ${misconceptionFor(S.sel.subject,currentSkillText())}`
  : ``),
``,
`LEARNER ACCOMMODATION DIRECTIVES (mandatory):`,
directives,
``,
`Put the child's name in the title or warm-up where natural. Make it feel like it was made just for them.`,
`Every instruction must pass the test: could THIS child read it alone and know exactly what to do and where to write — with a worked model right there in the format you expect? If not, rewrite it.`,
`Fill parentGuide fully and concretely for THIS exact skill and child — it is a real teaching guide a non-teacher parent will follow, not boilerplate. Be specific and observable; no edu-jargon without a plain-language gloss.`,
`Output JSON only.`
].filter(Boolean).join("\n");
}

/* ============================================================
   MODEL CATALOG  — curated "top models" + live discovery
   The Settings model fields are pull-downs. We seed them with a
   curated recommended list; once the key tests OK we fetch the
   account's real /v1/models and merge in what it can actually use.
   ============================================================ */
const TEXT_MODEL_RECS = [
  // newest → solid fallbacks. All chat+vision capable (vision = grading).
  "gpt-5.2","gpt-5.1","gpt-5","gpt-5-mini","gpt-4.1","gpt-4.1-mini","gpt-4o","gpt-4o-mini"
];
const IMAGE_MODEL_RECS = ["gpt-image-2","gpt-image-1.5","gpt-image-1","gpt-image-1-mini"];
let _liveModels=null; // {text:[...], image:[...]} once discovered
// crude family rank so newer sorts first within the live list
function _modelRank(id){
  const m=String(id);
  let v=0;
  const fam=m.match(/gpt-(\d+(?:\.\d+)?)/); if(fam) v=parseFloat(fam[1])*100;
  if(/^o(\d)/.test(m)) v=parseInt(RegExp.$1,10)*100+50;
  if(/-pro/.test(m)) v+=9; if(/mini/.test(m)) v-=15; if(/nano/.test(m)) v-=25;
  if(/image-2/.test(m)) v=220; else if(/image-1\.5/.test(m)) v=150; else if(/image-1-mini/.test(m)) v=90; else if(/image-1/.test(m)) v=120;
  if(/\d{4}-\d{2}-\d{2}|chat-latest|-latest/.test(m)) v-=2; // prefer the clean alias
  return v;
}
function classifyModels(ids){
  const text=[], image=[];
  ids.forEach(id=>{
    const m=String(id);
    if(/image/.test(m)){ if(!/(mask|edit)/.test(m)) image.push(m); return; }
    // chat-capable text models only — drop audio/realtime/transcribe/tts/search/embedding/moderation/codex/instruct
    if(/^(gpt-(4|5)|o[1345])/.test(m) &&
       !/(audio|realtime|transcribe|tts|search|embedding|moderation|codex|instruct|3\.5)/.test(m)){
      text.push(m);
    }
  });
  const uniqSort=a=>[...new Set(a)].sort((x,y)=>_modelRank(y)-_modelRank(x));
  return { text:uniqSort(text), image:uniqSort(image) };
}
async function discoverModels(key){
  const r=await fetch("https://api.openai.com/v1/models",{headers:{"Authorization":"Bearer "+(key||S.apiKey)}});
  if(!r.ok) throw new Error(parseApiErr(r.status, await r.text()));
  const d=await r.json();
  _liveModels=classifyModels((d.data||[]).map(m=>m.id));
  return _liveModels;
}
// Build the <option> list: recommended first (that the account has, if known),
// then the rest of the live list, current value always present, + Custom.
function modelOptions(kind, current){
  const recs = kind==="image"?IMAGE_MODEL_RECS:TEXT_MODEL_RECS;
  const live = _liveModels ? (kind==="image"?_liveModels.image:_liveModels.text) : null;
  let ordered;
  if(live){
    const haveRecs=recs.filter(m=>live.includes(m));
    ordered=[...haveRecs, ...live.filter(m=>!haveRecs.includes(m))];
  } else {
    ordered=[...recs];
  }
  if(current && !ordered.includes(current)) ordered.unshift(current);
  const top=ordered[0];
  const label=m=>m+(m===top?" — newest":"")+(m===current?" ✓":"");
  return ordered.map(m=>`<option value="${esc(m)}" ${m===current?'selected':''}>${esc(label(m))}</option>`).join("")
    + `<option value="__custom__">✏️ Custom / type my own…</option>`;
}

function _isCustomModel(kind,val){
  if(!val) return false;
  const recs=kind==="image"?IMAGE_MODEL_RECS:TEXT_MODEL_RECS;
  const live=_liveModels?(kind==="image"?_liveModels.image:_liveModels.text):[];
  return !recs.includes(val) && !live.includes(val);
}

/* Newer reasoning-class models (gpt-5*, o1/o3/o4*) reject a custom
   `temperature` (only the default is allowed → 400). Omit it for those
   so swapping to a modern model in the dropdown "just works". */
function modelTakesTemperature(m){ return !/^(gpt-5|o1|o3|o4)/i.test(String(m||"")); }
function chatBody(messages, temp){
  const b={ model:S.textModel, messages, response_format:{ type:"json_object" } };
  if(modelTakesTemperature(S.textModel)) b.temperature=temp;
  return JSON.stringify(b);
}
async function openaiChat(messages){
  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+S.apiKey },
    body: chatBody(messages, 0.8)
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(parseApiErr(res.status, t));
  }
  const data = await res.json();
  return data.choices[0].message.content;
}
async function openaiImage(prompt){
  const res = await fetch("https://api.openai.com/v1/images/generations",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+S.apiKey },
    body: JSON.stringify({
      model: S.imageModel,
      prompt: prompt + (S.bwMode
        ? " — clean black-and-white line-art / coloring-book style illustration, bold outlines, NO color, NO grayscale shading, pure white background, wide banner composition, no text, no letters, no words, optimized to print perfectly on a black-and-white printer and to be colored in by the child"
        : " — friendly, colorful, kid-safe cartoon illustration, wide banner composition, clean background, no text, no letters, no words, prints clearly in black and white"),
      size: "1536x1024",
      n: 1
    })
  });
  if(!res.ok){ throw new Error(parseApiErr(res.status, await res.text())); }
  const data = await res.json();
  const d = data.data[0];
  return d.b64_json ? ("data:image/png;base64,"+d.b64_json) : d.url;
}
function parseApiErr(status, text){
  let msg=text;
  try{ msg=JSON.parse(text).error.message || text; }catch(e){}
  if(status===401) return "That OpenAI key was rejected (401). Check it in Settings.";
  if(status===429) return "OpenAI is rate-limiting or you're out of credit (429). Try again shortly.";
  if(status===404) return "Model '"+S.textModel+"' not found (404). Pick a model you have access to in Settings.";
  return "OpenAI error "+status+": "+msg;
}

const LOAD_LINES=[
  "Reading the learning profile… 🧠",
  "Choosing the perfect difficulty… 🎚️",
  "Writing a warm-up example… ✏️",
  "Weaving in the theme… 🎨",
  "Applying learning supports… 🧪",
  "Double-checking the answer key… ✅",
  "Drawing something fun… 🖍️"

/* ============================================================
   P0: ANSWER-KEY VERIFICATION
   Independent second solve + deterministic arithmetic guard.
   A wrong key corrupts grading→mastery→adaptation, so this runs
   before any sheet is shown.
   ============================================================ */
function tryArithmetic(prompt){
  // Only fires on a clean pure-arithmetic expression — a safe bonus check.
  const m=String(prompt).match(/(-?\d+(?:\.\d+)?)\s*([+\-x×*\/÷])\s*(-?\d+(?:\.\d+)?)\s*=\s*(?:\?|_+|\bblank\b)?\s*$/i);
  if(!m) return null;
  const a=parseFloat(m[1]), b=parseFloat(m[3]); let op=m[2];
  if(op==='x'||op==='×'||op==='*') return a*b;
  if(op==='/'||op==='÷') return b===0?null:a/b;
  if(op==='+') return a+b;
  if(op==='-') return a-b;
  return null;
}
/* ============================================================
   NORMALIZE — make every item render correctly regardless of how
   sloppily the model returned it. The model often (a) jams the
   answer choices into the prompt sentence instead of `options`,
   (b) repeats the section instruction on every item, (c) uses a
   match/draw-a-line task the sheet can't draw. We repair all that
   here so the child gets a clean, doable sheet.
   ============================================================ */
function _splitChoices(s){
  s=String(s||"").trim().replace(/[.?!]+$/,"");
  if(s.length>70) return null;
  if(!/[,/;↔]| or | vs /i.test(s)) return null;
  const toks=s.split(/\s*(?:,| or | vs |;|\/|↔|↔️)\s*/i)
    .map(t=>t.trim()).filter(Boolean);
  if(toks.length<2 || toks.length>4) return null;
  if(toks.some(t=>t.length>24 || t.split(/\s+/).length>3)) return null;
  return toks;
}
function _looksChoosy(t){ return /\b(circle|choose|pick|match|underline|tick|mark|which|connect|draw a line)\b/i.test(String(t||"")); }
function _coreInstr(s){ return stripMd(String(s||"")).replace(/\bLike this:.*/i,"").replace(/[\s:.\-–—]+$/,"").trim().toLowerCase(); }
function _normItem(it, secInstr){
  if(!it) return;
  let p=stripMd(it.prompt||"").trim();
  const hasOpts=Array.isArray(it.options)&&it.options.filter(o=>o!=null&&String(o).trim()).length>=2;
  // 1) extract inline choices into options[] when missing
  if(!hasOpts && (_looksChoosy(p)||_looksChoosy(secInstr)||_looksChoosy(it.instructions))){
    let cand=p, head="";
    const ci=p.lastIndexOf(":");
    if(ci>=0){ head=p.slice(0,ci).trim(); cand=p.slice(ci+1).trim(); }
    let toks=_splitChoices(cand);
    if(!toks && ci<0) toks=_splitChoices(p);
    if(toks){
      it.options=toks;
      // drop the choice list (and a leading restated instruction) from the prompt
      p = (ci>=0 ? head : "").trim();
    }
  }
  // 2) kill a prompt that just restates the section instruction
  if(p && secInstr){
    const cp=_coreInstr(p), cs=_coreInstr(secInstr);
    if(cp && (cp===cs || (cs.length>8 && cp.startsWith(cs)) || (cp.length>8 && cs.startsWith(cp)))) p="";
  }
  it.prompt=p;
  // 3) de-↔ the answer; if it became a single clean option keep it sane
  if(it.answer!=null){
    let a=stripMd(it.answer).replace(/\s*↔.*$/,"").replace(/[.?!]+$/,"").trim();
    if(Array.isArray(it.options)&&it.options.length){
      const m=it.options.find(o=>String(o).trim().toLowerCase()===a.toLowerCase());
      if(m) a=m;
    }
    it.answer=a;
  }
  // 4) tracing without text → not tracing (avoid an empty tracing strip)
  if(it.response==="tracing" && !String(it.tracingText||"").trim()){
    if(Array.isArray(it.options)&&it.options.length>=2) it.response="blank";
    else { it.tracingText=String(it.answer||"").trim()||null; if(!it.tracingText) it.response="lines"; }
  }
}
function normalizeWS(ws){
  if(!ws||typeof ws!=="object") return ws;
  (ws.sections||[]).forEach(sec=>{
    const si=sec&&sec.instructions||"";
    (sec&&sec.items||[]).forEach(it=>_normItem(it, si));
  });
  if(ws.guidedPractice) (ws.guidedPractice.items||[]).forEach(g=>_normItem(g, ws.guidedPractice.instructions||""));
  if(ws.challenge) _normItem(ws.challenge, "");
  // collapse an empty/duplicate worked example so it doesn't print the
  // instruction twice with no answer shown
  if(ws.warmUp){
    const ep=stripMd(ws.warmUp.exampleProblem||"").replace(/\s+/g,"").toLowerCase();
    let so=stripMd(ws.warmUp.workedSolution||"");
    const son=so.replace(/\s+/g,"").toLowerCase();
    if(!son || son===ep || son.indexOf(ep)===0 && so.length<ws.warmUp.exampleProblem.length+4){
      ws.warmUp._weak=true;
    }
  }
  return ws;
}

function collectItems(ws){
  const out=[];
  if(ws.guidedPractice) (ws.guidedPractice.items||[]).forEach((g,i)=>out.push({number:"G"+(i+1),prompt:g.prompt,answer:g.answer,_guided:i}));
  (ws.sections||[]).forEach(s=>(s.items||[]).forEach(it=>out.push(it)));
  if(ws.challenge) out.push({number:"★",prompt:ws.challenge.prompt,answer:ws.challenge.answer,_challenge:true});
  return out;
}
async function verifyWorksheet(ws){
  const items=collectItems(ws);
  if(!items.length) return ws;
  const payload=items.map(it=>({n:it.number,q:it.prompt}));
  const vsys=[
"You are a meticulous answer-checker for a children's worksheet. Independently SOLVE each item from scratch. Do not assume any prior answer.",
"For each item return the single correct answer. If an item is ambiguous, unsolvable, or has multiple correct answers, set ok=false and explain briefly.",
'Return ONLY JSON: { "solved":[ {"n":number|string,"answer":string,"ok":boolean,"issue":string|null} ] }'
  ].join("\n");
  const vraw=await openaiChat([
    {role:"system",content:vsys},
    {role:"user",content:"Solve these and return JSON:\n"+JSON.stringify(payload)}
  ]);
  let v; try{ v=JSON.parse(vraw); }catch(e){ v=JSON.parse(vraw.replace(/^[^{]*/,"").replace(/[^}]*$/,"")); }
  const solved={}; (v.solved||[]).forEach(s=>solved[String(s.n)]=s);

  let fixes=0, flags=[];
  const norm=x=>String(x==null?"":x).trim().toLowerCase().replace(/\s+/g,"").replace(/[.,]$/,"");
  items.forEach(it=>{
    const key=String(it.number);
    const det=tryArithmetic(it.prompt);
    if(det!==null){
      const want=Number.isInteger(det)?String(det):String(+det.toFixed(4));
      if(norm(it.answer)!==norm(want)){ setItemAnswer(ws,it,want); fixes++; }
      return;
    }
    const s=solved[key]; if(!s) return;
    if(s.ok===false){ flags.push("Q"+key+": "+(s.issue||"flagged ambiguous")); }
    if(s.answer!=null && norm(s.answer)!==norm(it.answer)){ setItemAnswer(ws,it,String(s.answer)); fixes++; }
  });
  // rebuild answerKey from the (now corrected) items
  ws.answerKey=collectItems(ws).filter(i=>!i._challenge && i._guided==null).map(i=>({number:i.number,answer:i.answer}));
  if(flags.length){
    ws.teacherNotes=(ws.teacherNotes||"")+"  ⚠️ Auto-check flagged: "+flags.join("; ")+
      " — review these before use.";
  }
  ws._verified={fixes,flags:flags.length,at:Date.now()};
  return ws;
}
function setItemAnswer(ws,item,ans){
  if(item._challenge){ if(ws.challenge) ws.challenge.answer=ans; return; }
  if(item._guided!=null){ if(ws.guidedPractice&&ws.guidedPractice.items[item._guided]) ws.guidedPractice.items[item._guided].answer=ans; item.answer=ans; return; }
  (ws.sections||[]).forEach(s=>(s.items||[]).forEach(it=>{ if(it===item||String(it.number)===String(item.number)) it.answer=ans; }));
  item.answer=ans;
}

    catch(e){ ws=JSON.parse(raw.replace(/^[^{]*/,"").replace(/[^}]*$/,"")); }

      worksheet:ws, image:img };
    S.history.unshift(rec); if(S.history.length>40) S.history.pop(); save();
    logEvent("generate", (rec.params.subject||"")+" / "+(rec.params.skill||""), { grade:rec.params.grade, theme:rec.params.theme });

  }catch(e){

    document.getElementById("robot").classList.remove("think");
    document.getElementById("rgear").classList.remove("fast");
    document.getElementById("screen-loading").innerHTML=`
      <div class="loading">

          <button class="btn ghost" onclick="renderReview()">‹ Back</button>
        </div>
      </div>`;
    say("Something tripped me up. Peek at the message — usually it's the API key or model. 🔧","","");
  }
}

/* ============================================================
   PARENT & TEACHER GUIDE — its own printable page
   A real little teacher guide: objective, competencies, how to
   introduce it, coaching moves, what to watch for, what
   good/normal/struggling looks like, next step, + answer key.
   Degrades gracefully for older history records with no parentGuide.
   ============================================================ */
function parentGuideHTML(ws,k,accClasses,rec){
  const pg=ws.parentGuide||{};
  const subj = rec&&rec.params ? subjLabel(rec.params.subject) : subjLabel(S.sel.subject);
  const list=(arr)=> (Array.isArray(arr)&&arr.length)
    ? `<ul>${arr.map(x=>`<li>${esc(String(x))}</li>`).join("")}</ul>` : "";
  const comps=(Array.isArray(pg.competencies)&&pg.competencies.length)
    ? `<div class="pg-comps">${pg.competencies.map(c=>`<span class="pg-comp">${esc(String(c))}</span>`).join("")}</div>` : "";
  const accs=(k?k.accoms:[]).map(id=>ACCOMMODATIONS.find(a=>a.id===id)).filter(Boolean);
  const flags=(ws.teacherNotes&&/⚠️/.test(ws.teacherNotes))?ws.teacherNotes:"";
  // answer key (guided G#, numbered items, challenge)
  const gA=(ws.guidedPractice&&(ws.guidedPractice.items||[]).length)
    ? ws.guidedPractice.items.map((g,i)=>`<div class="ak-row"><b>G${i+1}</b><span>${esc(String(g.answer==null?'—':g.answer))}</span></div>`).join("") : "";

  const cA=ws.challenge?`<div class="ak-row"><b>★</b><span>${esc(String(ws.challenge.answer==null?'—':ws.challenge.answer))}</span></div>`:"";
  const r=pg.looksLike||{};
  const hasGuide = pg.objective||comps||pg.howToIntroduce||(pg.coaching&&pg.coaching.length)||(pg.watchFors&&pg.watchFors.length)||r.strong||pg.nextStep;

    ${(pg.coaching&&pg.coaching.length)?`<div class="pg-block coach">

    ${(pg.watchFors&&pg.watchFors.length)?`<div class="pg-block watch">
      <h3>👀 Watch for</h3>${list(pg.watchFors)}</div>`:""}
    ${(r.strong||r.onTrack||r.needsSupport)?`<div class="pg-block">
      <h3>📊 What it looks like</h3>
      <div class="pg-rubric">
        <div class="pg-rcard s"><span class="rl">✅ Strong</span>${esc(r.strong||"—")}</div>

}

/* ============================================================
